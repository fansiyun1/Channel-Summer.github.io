<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Channel Summer | 夏日通道</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@400;600&family=Courier+Prime:wght@400;700&display=swap');

    :root {
      --paper: #fafafa;
      --paper-aged: #f5f5f5;
      --paper-stain: #e8e8e8;
      --sun-glow: rgba(255, 220, 150, 0.6);
      --sun-core: rgba(255, 240, 200, 0.9);
      --halo-soft: rgba(255, 245, 230, 0.4);
      --halo-bright: rgba(255, 250, 240, 0.8);
      --ink: #2c2c2c;
      --ink-faded: #6b6b6b;
      --ink-ghost: #999999;
      --seal: #b85c5c;
      --seal-faded: #d4a5a5;
      --shadow-soft: rgba(0,0,0,0.04);
      --shadow-medium: rgba(0,0,0,0.08);
      --chemtrails-blue: #7a9eb8;
      --chemtrails-pink: #e8ddd4;
      --chemtrails-cream: #f5f1e8;
      --chemtrails-gold: #c9b896;
      --chemtrails-green: #8fa68e;
      --pool-cyan: #7a9eb8;
      --pool-blue: #5a7a98;
      --font-serif: 'Noto Serif SC', 'Songti SC', 'SimSun', serif;
      --font-display: 'Cormorant Garamond', 'Noto Serif SC', serif;
      --font-sans: 'Montserrat', sans-serif;
      --font-mono: 'Courier Prime', 'Courier New', monospace;
      --font-playfair: 'Playfair Display', serif;
      --font-handwriting: 'Dancing Script', cursive;
      --transition-slow: 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-medium: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-fast: 0.3s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      font-family: var(--font-serif);
      background: #ffffff;
      color: var(--ink);
      line-height: 1.9;
      overflow-x: hidden;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* 夏日纯白空气背景系统 */
    #summer-memory {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -100;
      pointer-events: none;
      overflow: hidden;
      background: linear-gradient(180deg, #ffffff 0%, #f8f8f8 50%, #f5f5f5 100%);
    }

    /* 夏日阳光光晕层 */
    #sun-glow {
      position: fixed;
      top: -20%;
      right: -10%;
      width: 80vh;
      height: 80vh;
      border-radius: 50%;
      background: radial-gradient(circle at center, 
        rgba(255, 248, 220, 0.9) 0%,
        rgba(255, 240, 200, 0.6) 20%,
        rgba(255, 230, 180, 0.3) 40%,
        transparent 70%);
      filter: blur(40px);
      animation: sunPulse 8s ease-in-out infinite, sunDrift 20s ease-in-out infinite;
      z-index: -99;
      pointer-events: none;
    }

    @keyframes sunPulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    @keyframes sunDrift {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(3%, 2%); }
      50% { transform: translate(-2%, 4%); }
      75% { transform: translate(1%, -2%); }
    }

    #sun-halo-secondary {
      position: fixed;
      top: 10%;
      left: -15%;
      width: 60vh;
      height: 60vh;
      border-radius: 50%;
      background: radial-gradient(circle at center,
        rgba(255, 250, 240, 0.5) 0%,
        rgba(255, 245, 230, 0.3) 30%,
        transparent 60%);
      filter: blur(60px);
      animation: haloFloat 15s ease-in-out infinite reverse;
      z-index: -98;
      pointer-events: none;
    }

    @keyframes haloFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(5%, -3%) scale(1.1); }
      66% { transform: translate(-3%, 5%) scale(0.95); }
    }

    #sun-rays {
      position: fixed;
      top: -50%;
      right: -20%;
      width: 150vh;
      height: 150vh;
      background: conic-gradient(from 0deg at 50% 50%,
        transparent 0deg,
        rgba(255, 250, 220, 0.03) 10deg,
        transparent 20deg,
        rgba(255, 248, 210, 0.05) 30deg,
        transparent 40deg,
        rgba(255, 250, 220, 0.04) 50deg,
        transparent 60deg,
        rgba(255, 248, 210, 0.03) 70deg,
        transparent 80deg,
        rgba(255, 250, 220, 0.05) 90deg,
        transparent 100deg,
        rgba(255, 248, 210, 0.04) 110deg,
        transparent 120deg,
        rgba(255, 250, 220, 0.03) 130deg,
        transparent 140deg,
        rgba(255, 248, 210, 0.05) 150deg,
        transparent 160deg,
        rgba(255, 250, 220, 0.04) 170deg,
        transparent 180deg,
        rgba(255, 248, 210, 0.03) 190deg,
        transparent 200deg,
        rgba(255, 250, 220, 0.05) 210deg,
        transparent 220deg,
        rgba(255, 248, 210, 0.04) 230deg,
        transparent 240deg,
        rgba(255, 250, 220, 0.03) 250deg,
        transparent 260deg,
        rgba(255, 248, 210, 0.05) 270deg,
        transparent 280deg,
        rgba(255, 250, 220, 0.04) 290deg,
        transparent 300deg,
        rgba(255, 248, 210, 0.03) 310deg,
        transparent 320deg,
        rgba(255, 250, 220, 0.05) 330deg,
        transparent 340deg,
        rgba(255, 248, 210, 0.04) 350deg,
        transparent 360deg
      );
      animation: rayRotate 60s linear infinite;
      z-index: -97;
      pointer-events: none;
      opacity: 0.6;
    }

    @keyframes rayRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    #light-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -96;
      pointer-events: none;
      overflow: hidden;
    }

    .light-particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: radial-gradient(circle, rgba(255, 250, 220, 0.9) 0%, transparent 70%);
      border-radius: 50%;
      animation: particleFloat 20s ease-in-out infinite;
      filter: blur(1px);
    }

    @keyframes particleFloat {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.4; }
      25% { transform: translate(100px, -50px) scale(1.5); opacity: 0.8; }
      50% { transform: translate(-50px, -100px) scale(1); opacity: 0.5; }
      75% { transform: translate(50px, 50px) scale(1.3); opacity: 0.7; }
    }

    #memory-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.6;
      mix-blend-mode: multiply;
    }

    #paper-texture {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.08;
      mix-blend-mode: overlay;
      background-image: 
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,250,240,0.02) 2px, rgba(255,250,240,0.02) 4px),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    #vignette {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9998;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(255, 248, 220, 0.3) 100%);
    }

    /* 顶部状态栏 */
    #top-matter {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 50px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--ink-ghost);
      border-bottom: 1px solid transparent;
      transition: var(--transition-medium);
      z-index: 100;
    }

    #top-matter.visible {
      border-bottom-color: var(--paper-stain);
      background: rgba(245, 241, 232, 0.95);
      backdrop-filter: blur(20px);
    }

    .top-left, .top-right { display: flex; gap: 30px; align-items: center; }
    .top-item { opacity: 0.6; transition: var(--transition-fast); cursor: default; }
    .top-item:hover { opacity: 1; color: var(--seal); }

    .project-mark {
      font-family: var(--font-sans);
      font-size: 11px;
      letter-spacing: 3px;
      font-weight: 400;
    }

    /* 主舞台 */
    #main-stage { min-height: 100vh; position: relative; }

    /* 阈值层：火漆封印 */
    #threshold-seal {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 40px;
      position: relative;
      opacity: 1;
      transform: translateY(0);
      transition: opacity var(--transition-slow), transform var(--transition-slow);
    }

    #threshold-seal.dissolved {
      opacity: 0;
      transform: translateY(-30px);
      pointer-events: none;
    }

    .wax-seal {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: var(--seal);
      position: relative;
      margin-bottom: 60px;
      box-shadow: 0 4px 20px rgba(184, 92, 92, 0.3), inset 0 -10px 20px rgba(0,0,0,0.1);
      transform: rotate(-5deg);
      transition: var(--transition-medium);
    }

    .wax-seal::before {
      content: 'CS';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--paper);
      font-size: 28px;
      font-weight: 400;
      font-family: var(--font-sans);
      letter-spacing: 2px;
    }

    .wax-seal.cracked {
      animation: crack 0.8s ease forwards;
    }

    @keyframes crack {
      0% { transform: rotate(-5deg) scale(1); }
      50% { transform: rotate(-5deg) scale(1.1); }
      100% { 
        transform: rotate(-5deg) scale(1);
        box-shadow: 0 2px 10px rgba(184, 92, 92, 0.2), inset 0 -5px 10px rgba(0,0,0,0.1);
        opacity: 0.6;
      }
    }

    .seal-question {
      font-family: var(--font-display);
      font-size: clamp(22px, 3.5vw, 32px);
      font-weight: 300;
      text-align: center;
      line-height: 2;
      color: var(--ink);
      margin-bottom: 70px;
      max-width: 700px;
      letter-spacing: 1px;
    }

    .seal-question em { font-style: italic; color: var(--seal); }

    .project-title {
      font-family: var(--font-sans);
      font-size: 12px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--ink-ghost);
      margin-bottom: 40px;
    }

    .ink-well {
      position: relative;
      width: 100%;
      max-width: 400px;
      margin-bottom: 50px;
    }

    #ink-input {
      width: 100%;
      padding: 25px 30px;
      font-family: var(--font-serif);
      font-size: 18px;
      color: var(--ink);
      background: rgba(255,255,255,0.9);
      border: none;
      border-bottom: 2px solid var(--ink-ghost);
      text-align: center;
      transition: var(--transition-medium);
      position: relative;
      z-index: 10;
      backdrop-filter: blur(10px);
      box-shadow: 0 2px 20px rgba(0,0,0,0.02);
    }

    #ink-input:focus {
      outline: none;
      border-bottom-color: var(--seal);
      background: rgba(255,255,255,0.98);
      box-shadow: 0 8px 40px rgba(184, 92, 92, 0.06);
    }

    #ink-input::placeholder {
      color: var(--ink-ghost);
      font-style: italic;
      opacity: 0.6;
    }

    .ink-line {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 0;
      height: 2px;
      background: var(--seal);
      transition: var(--transition-medium);
      transform: translateX(-50%);
    }

    #ink-input:focus ~ .ink-line { width: 100%; }

    #break-seal {
      padding: 18px 50px;
      font-family: var(--font-serif);
      font-size: 14px;
      letter-spacing: 4px;
      color: var(--paper);
      background: var(--ink);
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: var(--transition-medium);
      box-shadow: 0 4px 20px var(--shadow-medium);
      z-index: 10;
    }

    #break-seal::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: var(--seal);
      transition: var(--transition-medium);
      z-index: 0;
    }

    #break-seal:hover::before { left: 0; }
    #break-seal span { position: relative; z-index: 1; }
    #break-seal:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--shadow-medium); }
    #break-seal:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .marginalia {
      margin-top: 60px;
      font-size: 12px;
      color: var(--ink-ghost);
      font-style: italic;
      text-align: center;
      max-width: 500px;
      line-height: 2;
    }

    .faded-word {
      display: inline-block;
      margin: 0 8px;
      padding: 4px 12px;
      background: rgba(255,255,255,0.8);
      border-radius: 2px;
      transition: var(--transition-fast);
      cursor: default;
      backdrop-filter: blur(5px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }

    .faded-word:hover { color: var(--seal); background: rgba(184, 92, 92, 0.08); }

    /* 星系层：星图 */
    #star-atlas {
      display: none;
      min-height: 100vh;
      padding: 120px 60px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity var(--transition-slow), transform var(--transition-slow);
    }

    #star-atlas.revealed { display: block; opacity: 1; transform: translateY(0); }

    .atlas-header { text-align: center; margin-bottom: 80px; }

    .atlas-title {
      font-family: var(--font-sans);
      font-size: 11px;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: var(--ink-ghost);
      margin-bottom: 20px;
    }

    .atlas-subtitle { font-size: 13px; color: var(--ink-faded); font-style: italic; }

    #constellation {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 40px;
      max-width: 900px;
      margin: 0 auto;
      aspect-ratio: 1 / 1;
      max-height: 80vh;
    }

    .star-entry {
      position: relative;
      padding: 50px 40px;
      background: rgba(255,255,255,0.85);
      border: 1px solid var(--paper-stain);
      cursor: pointer;
      transition: var(--transition-medium);
      overflow: hidden;
      backdrop-filter: blur(15px);
      z-index: 10;
      box-shadow: 0 4px 30px rgba(0,0,0,0.03);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .star-entry[data-channel="contrail"]::before {
      background: linear-gradient(135deg, var(--chemtrails-pink) 0%, var(--chemtrails-blue) 100%);
    }

    .star-entry[data-channel="lemontree"]::before {
      background: linear-gradient(135deg, #FFFACD 0%, #9ACD32 100%);
    }

    .star-entry[data-channel="highway"]::before {
      background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
    }

    .star-entry[data-channel="pool"]::before {
      background: linear-gradient(135deg, var(--pool-cyan) 0%, var(--pool-blue) 100%);
    }

    .star-entry::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 0;
      transition: height var(--transition-medium);
      opacity: 0.15;
    }

    .star-entry:hover::before { height: 100%; }
    .star-entry:hover { 
      transform: scale(1.02); 
      box-shadow: 0 20px 60px rgba(0,0,0,0.08); 
      background: rgba(255,255,255,0.95);
      border-color: var(--seal-faded);
    }

    .entry-number {
      position: absolute;
      top: 25px;
      right: 30px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--ink-ghost);
      letter-spacing: 3px;
      opacity: 0.6;
    }

    .entry-title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 300;
      margin-bottom: 20px;
      color: var(--ink);
      transition: var(--transition-fast);
      pointer-events: none;
      letter-spacing: 2px;
    }

    .star-entry:hover .entry-title { color: var(--seal); }

    .entry-type {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--ink-ghost);
      margin-bottom: 30px;
      pointer-events: none;
      font-family: var(--font-sans);
    }

    .entry-trace {
      font-size: 14px;
      color: var(--ink-faded);
      font-style: italic;
      line-height: 1.8;
      opacity: 0.7;
      transition: var(--transition-fast);
      pointer-events: none;
      max-width: 100%;
      word-wrap: break-word;
      white-space: normal;
    }

    .entry-trace::before {
      content: "\201C";
      color: var(--ink-faded);
      opacity: 0.8;
    }

    .entry-trace::after {
      content: "\201D";
      color: var(--ink-faded);
      opacity: 0.8;
    }

    .star-entry:hover .entry-trace { opacity: 1; color: var(--ink); }

    /* 通道层 */
    #open-page {
      display: none;
      min-height: 100vh;
      opacity: 0;
      transition: opacity var(--transition-slow);
    }

    #open-page.visible { display: block; opacity: 1; }

    .page-header {
      position: sticky;
      top: 50px;
      padding: 30px 60px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid var(--paper-stain);
      background: rgba(245, 241, 232, 0.95);
      backdrop-filter: blur(20px);
      z-index: 50;
    }

    .page-location { font-family: var(--font-display); font-size: 20px; font-weight: 300; }

    .page-coordinates {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--ink-ghost);
      letter-spacing: 2px;
      margin-top: 5px;
    }

    #close-page {
      font-family: var(--font-serif);
      font-size: 12px;
      color: var(--ink-ghost);
      background: none;
      border: 1px solid var(--paper-stain);
      padding: 10px 25px;
      cursor: pointer;
      transition: var(--transition-fast);
      letter-spacing: 2px;
    }

    #close-page:hover { color: var(--seal); border-color: var(--seal); background: rgba(184, 92, 92, 0.05); }

    .page-content { max-width: 100%; margin: 0; padding: 0; }

    /* Chemtrails 板块 - 丰富拼贴风格 */
    .chemtrails-content {
      position: relative;
      min-height: 100vh;
      background: linear-gradient(180deg, #ffffff 0%, #fafafa 50%, #f5f5f5 100%);
    }

    .chemtrails-hero-collage {
      position: relative;
      min-height: 100vh;
      padding: 80px 60px;
      overflow: hidden;
    }

    .chemtrails-p5-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .collage-photo {
      position: absolute;
      z-index: 10;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      transition: all 0.5s ease;
      cursor: pointer;
      overflow: hidden;
      background: transparent;
      padding: 0;
      border: none;
    }

    .collage-photo:hover {
      transform: scale(1.05) rotate(0deg) !important;
      z-index: 100;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }

    .collage-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: sepia(20%) saturate(85%) contrast(95%);
      transition: filter 0.3s ease;
    }

    .collage-photo:hover img {
      filter: sepia(0%) saturate(100%) contrast(100%);
    }

    .photo-1 { width: 280px; height: 200px; top: 15%; left: 5%; transform: rotate(-5deg); }
    .photo-2 { width: 240px; height: 320px; top: 10%; right: 8%; transform: rotate(3deg); }
    .photo-3 { width: 200px; height: 150px; top: 50%; left: 3%; transform: rotate(2deg); }
    .photo-4 { width: 260px; height: 180px; bottom: 20%; left: 15%; transform: rotate(-3deg); }
    .photo-5 { width: 220px; height: 280px; bottom: 15%; right: 10%; transform: rotate(4deg); }
    .photo-6 { width: 200px; height: 150px; top: 45%; right: 5%; transform: rotate(-2deg); }
    .photo-7 { width: 220px; height: 160px; bottom: 35%; right: 25%; transform: rotate(3deg); }

    .typewriter-layer {
      position: absolute;
      z-index: 20;
      pointer-events: none;
    }

    .typewriter-text {
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.8;
      color: #4a5568;
      background: rgba(255,255,255,0.9);
      padding: 25px 30px;
      max-width: 320px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      border: 1px solid rgba(0,0,0,0.05);
    }

    .typewriter-text.left { top: 25%; left: 35%; transform: rotate(-1deg); }
    .typewriter-text.right { top: 55%; right: 30%; transform: rotate(1deg); }
    .typewriter-text.center { bottom: 25%; left: 50%; transform: translateX(-50%) rotate(-0.5deg); }

    .typewriter-header {
      font-size: 10px;
      letter-spacing: 3px;
      color: #718096;
      margin-bottom: 15px;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 8px;
    }

    .typewriter-line {
      margin: 8px 0;
      opacity: 0;
      animation: typeIn 0.8s ease forwards;
    }

    .typewriter-line:nth-child(2) { animation-delay: 0.3s; }
    .typewriter-line:nth-child(3) { animation-delay: 0.6s; }
    .typewriter-line:nth-child(4) { animation-delay: 0.9s; }
    .typewriter-line:nth-child(5) { animation-delay: 1.2s; }

    @keyframes typeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .handwritten-lyric {
      position: absolute;
      font-family: var(--font-handwriting);
      font-size: 32px;
      color: #5a6b7c;
      opacity: 0.9;
      text-shadow: 2px 2px 4px rgba(255,255,255,0.6);
      z-index: 15;
      pointer-events: none;
    }

    .handwritten-lyric.top { top: 8%; left: 50%; transform: translateX(-50%) rotate(-2deg); }
    .handwritten-lyric.bottom { bottom: 8%; left: 20%; transform: rotate(2deg); }

    .collage-stamp {
      position: absolute;
      width: 80px;
      height: 80px;
      border: 2px solid rgba(184, 92, 92, 0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(184, 92, 92, 0.6);
      transform: rotate(15deg);
      z-index: 25;
      pointer-events: none;
    }

    .collage-stamp.top-right { top: 5%; right: 25%; }

    .scroll-hint {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      text-align: center;
      animation: bounce 2s infinite;
    }

    .scroll-hint-text {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 3px;
      color: #718096;
      margin-bottom: 8px;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
      40% { transform: translateX(-50%) translateY(-10px); }
      60% { transform: translateX(-50%) translateY(-5px); }
    }

    .chemtrails-prose-section {
      position: relative;
      z-index: 40;
      background: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.95) 10%, rgba(250,250,250,0.98) 100%);
      padding: 100px 0 60px;
      margin-top: -100px;
      width: 100vw;
      margin-left: calc(-50vw + 50%);
    }

    .chemtrails-prose {
      max-width: 680px;
      margin: 0 auto;
      background: rgba(255,255,255,0.95);
      padding: 60px;
      border: 1px solid var(--paper-stain);
      box-shadow: 0 10px 40px rgba(0,0,0,0.05);
    }

    .prose-fullwidth-wrapper {
      width: 100vw;
      margin-left: calc(-50vw + 50%);
      padding: 80px 0;
    }

    .chemtrails-prose p {
      font-size: 16px;
      line-height: 2.4;
      margin-bottom: 2em;
      text-align: justify;
      text-indent: 2em;
      color: var(--ink-faded);
    }

    .chemtrails-prose p:first-letter {
      font-family: var(--font-playfair);
      font-size: 3.5em;
      float: left;
      line-height: 0.9;
      margin-right: 0.1em;
      margin-top: -0.05em;
      color: var(--chemtrails-blue);
    }

    .chemtrails-quote-block {
      margin: 60px 0;
      padding: 40px 50px;
      border-left: 2px solid var(--chemtrails-gold);
      background: linear-gradient(90deg, rgba(201,184,150,0.08) 0%, transparent 100%);
      font-family: var(--font-playfair);
      font-style: italic;
      font-size: 22px;
      color: #5a6b7c;
      line-height: 1.7;
      position: relative;
    }

    .chemtrails-quote-block::before {
      content: '"';
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 60px;
      color: var(--chemtrails-gold);
      opacity: 0.3;
      font-family: Georgia, serif;
      line-height: 1;
    }

    /* 全屏P5视觉区域 */
    .p5-fullscreen-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }
    
    #p5-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    
    #p5-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }
    
    .p5-overlay {
      position: absolute;
      bottom: 60px;
      left: 60px;
      z-index: 10;
      pointer-events: none;
      opacity: 0.9;
    }
    
    .p5-content-wrapper {
      margin: 0 auto;
      padding: 80px 40px;
    }
    
    @media (max-width: 768px) {
      .p5-overlay {
        bottom: 30px;
        left: 20px;
      }
      
      .p5-content-wrapper {
        padding: 40px 20px;
      }
    }

    /* 痕迹区域 */
    .reader-margin {
      max-width: 680px;
      margin: 100px auto;
      padding: 60px 50px;
      background: linear-gradient(180deg, 
        rgba(250, 248, 245, 0.98) 0%, 
        rgba(245, 242, 238, 0.95) 50%,
        rgba(240, 236, 230, 0.92) 100%);
      border: 1px solid rgba(200, 190, 180, 0.4);
      border-radius: 2px;
      position: relative;
      box-shadow: 
        0 4px 20px rgba(0,0,0,0.03),
        inset 0 1px 0 rgba(255,255,255,0.8);
    }

    .reader-margin::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 28px,
          rgba(180, 170, 160, 0.05) 28px,
          rgba(180, 170, 160, 0.05) 29px
        );
      pointer-events: none;
      opacity: 0.6;
    }

    .reader-margin::after {
      content: '';
      position: absolute;
      left: 30px;
      top: 60px;
      bottom: 60px;
      width: 2px;
      background: linear-gradient(180deg,
        transparent 0%,
        rgba(184, 92, 92, 0.2) 10%,
        rgba(184, 92, 92, 0.15) 90%,
        transparent 100%);
    }

    .margin-prompt {
      font-family: var(--font-handwriting);
      font-size: 26px;
      color: #7a6b5a;
      margin-bottom: 40px;
      padding-left: 40px;
      line-height: 1.6;
      position: relative;
      opacity: 0.9;
      letter-spacing: 0.5px;
    }

    .margin-prompt::before {
      content: '✦';
      position: absolute;
      left: 0;
      color: var(--seal);
      opacity: 0.5;
      font-size: 20px;
    }

    .margin-form {
      display: flex;
      gap: 15px;
      margin-bottom: 50px;
      padding-left: 40px;
      position: relative;
    }

    #margin-input {
      flex: 1;
      padding: 18px 22px;
      font-family: var(--font-serif);
      font-size: 16px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(180, 170, 160, 0.4);
      border-bottom: 2px solid rgba(180, 170, 160, 0.6);
      transition: all 0.4s ease;
      position: relative;
      backdrop-filter: blur(5px);
    }

    #margin-input:focus {
      outline: none;
      border-color: rgba(184, 92, 92, 0.4);
      border-bottom-color: var(--seal);
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 4px 15px rgba(184, 92, 92, 0.08);
    }

    #margin-input::placeholder {
      color: #a09080;
      font-style: italic;
      opacity: 0.7;
    }

    #leave-trace {
      padding: 16px 32px;
      font-family: var(--font-serif);
      font-size: 14px;
      letter-spacing: 3px;
      color: var(--paper);
      background: var(--ink);
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 3px 12px rgba(0,0,0,0.15);
    }

    #leave-trace::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: var(--seal);
      transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 0;
    }

    #leave-trace:hover::before {
      left: 0;
    }

    #leave-trace span {
      position: relative;
      z-index: 1;
    }

    #leave-trace:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(184, 92, 92, 0.25);
    }

    #leave-trace:active {
      transform: translateY(0);
    }

    .ex-libris {
      margin-top: 50px;
      padding-top: 40px;
      border-top: 1px solid rgba(180, 170, 160, 0.3);
      position: relative;
    }

    .ex-header {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 4px;
      color: #9a8b7a;
      text-transform: uppercase;
      margin-bottom: 30px;
      padding-left: 40px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .ex-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, 
        rgba(180, 170, 160, 0.4) 0%, 
        transparent 100%);
    }

    #traces-collection {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-left: 40px;
    }

    .trace-stamp {
      position: relative;
      padding: 20px 25px 20px 30px;
      background: linear-gradient(135deg, 
        rgba(255, 253, 250, 0.95) 0%, 
        rgba(252, 250, 247, 0.9) 100%);
      border-left: 3px solid rgba(180, 170, 160, 0.4);
      border-radius: 0 4px 4px 0;
      font-family: var(--font-handwriting);
      font-size: 18px;
      color: #5a5045;
      line-height: 1.6;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: default;
      box-shadow: 
        0 2px 8px rgba(0,0,0,0.04),
        0 1px 3px rgba(0,0,0,0.02);
      opacity: 0.85;
    }

    .trace-stamp.own {
      background: linear-gradient(135deg, 
        rgba(255, 250, 245, 0.98) 0%, 
        rgba(255, 245, 240, 0.95) 100%);
      border-left-color: var(--seal);
      opacity: 1;
      box-shadow: 
        0 3px 12px rgba(184, 92, 92, 0.1),
        0 1px 4px rgba(0,0,0,0.04);
    }

    .trace-stamp:hover {
      transform: translateX(8px) scale(1.01);
      opacity: 1;
      box-shadow: 
        0 6px 20px rgba(0,0,0,0.08),
        0 2px 8px rgba(0,0,0,0.04);
      border-left-color: var(--seal-faded);
    }

    .trace-stamp.own:hover {
      border-left-color: var(--seal);
      background: linear-gradient(135deg, 
        rgba(255, 252, 250, 1) 0%, 
        rgba(255, 248, 245, 0.98) 100%);
    }

    .trace-stamp::after {
      content: attr(data-time);
      position: absolute;
      bottom: 8px;
      right: 15px;
      font-family: var(--font-mono);
      font-size: 9px;
      color: #b0a090;
      letter-spacing: 1px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .trace-stamp:hover::after {
      opacity: 0.7;
    }

    .trace-stamp::before {
      content: '"';
      position: absolute;
      top: 10px;
      left: 12px;
      font-family: Georgia, serif;
      font-size: 24px;
      color: rgba(180, 170, 160, 0.3);
      line-height: 1;
    }

    #traces-collection:empty::before {
      content: '暂无痕迹，成为第一个留下印记的人...';
      font-family: var(--font-serif);
      font-size: 14px;
      color: #a09080;
      font-style: italic;
      padding: 30px 0;
      text-align: center;
      opacity: 0.6;
    }

    @media (max-width: 768px) {
      #top-matter { padding: 0 20px; font-size: 9px; }
      .top-left, .top-right { gap: 15px; }
      #threshold-seal { padding: 80px 20px; }
      #star-atlas { padding: 100px 20px; }

      #constellation { 
        grid-template-columns: 1fr; 
        grid-template-rows: repeat(4, auto);
        gap: 20px;
        aspect-ratio: auto;
        max-height: none;
      }

      .star-entry { padding: 30px 25px; min-height: 200px; }
      .entry-title { font-size: 22px; }
      .page-header { padding: 20px; flex-direction: column; gap: 15px; align-items: flex-start; }

      .chemtrails-hero-collage { padding: 40px 20px; min-height: auto; }
      .collage-photo {
        position: relative;
        width: 100% !important;
        height: 200px !important;
        top: auto !important;
        left: auto !important;
        right: auto !important;
        bottom: auto !important;
        transform: none !important;
        margin-bottom: 20px;
      }

      .typewriter-layer { position: relative; margin: 20px 0; }
      .typewriter-text { max-width: 100%; }
      .typewriter-text.left,
      .typewriter-text.right,
      .typewriter-text.center {
        position: relative;
        top: auto;
        left: auto;
        right: auto;
        bottom: auto;
        transform: none;
      }

      .handwritten-lyric { font-size: 24px; position: relative; text-align: center; margin: 20px 0; }
      .handwritten-lyric.top,
      .handwritten-lyric.bottom {
        position: relative;
        top: auto;
        left: auto;
        bottom: auto;
        transform: none;
      }

      .chemtrails-prose { padding: 30px; }
      .wax-seal { width: 70px; height: 70px; }
      .wax-seal::before { font-size: 22px; }
      
      .reader-margin {
        margin: 60px 20px;
        padding: 40px 25px;
      }
      
      .reader-margin::after {
        left: 15px;
        top: 40px;
        bottom: 40px;
      }
      
      .margin-prompt,
      .margin-form,
      .ex-header,
      #traces-collection {
        padding-left: 25px;
      }
      
      .margin-prompt {
        font-size: 22px;
      }
      
      .margin-form {
        flex-direction: column;
      }
      
      #leave-trace {
        width: 100%;
        padding: 16px;
      }
      
      .trace-stamp {
        font-size: 16px;
        padding: 16px 20px 16px 25px;
      }
    }

    #ink-input.error {
      border-bottom-color: #ff6b6b;
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    /* 藏书票样式 */
    #collector-stamp-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(245, 241, 232, 0.95);
      backdrop-filter: blur(20px);
      z-index: 10000;
      display: none;
      opacity: 0;
      transition: opacity 0.6s ease;
      overflow-y: auto;
    }

    #collector-stamp-overlay.visible {
      display: flex;
      opacity: 1;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .stamp-container {
      position: relative;
      width: 100%;
      max-width: 600px;
      background: linear-gradient(135deg, #faf8f5 0%, #f5f2ed 100%);
      border: 1px solid rgba(180, 160, 140, 0.3);
      padding: 60px 50px;
      box-shadow: 
        0 25px 80px rgba(0,0,0,0.12),
        0 10px 30px rgba(0,0,0,0.08),
        inset 0 1px 0 rgba(255,255,255,0.8);
      transform: translateY(30px) scale(0.95);
      opacity: 0;
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #collector-stamp-overlay.visible .stamp-container {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .stamp-close {
      position: absolute;
      top: 20px;
      right: 25px;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(180, 160, 140, 0.4);
      border-radius: 50%;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      font-size: 18px;
      color: #8a7a6a;
    }

    .stamp-close:hover {
      background: rgba(184, 92, 92, 0.1);
      border-color: var(--seal);
      color: var(--seal);
      transform: rotate(90deg);
    }

    .stamp-header {
      text-align: center;
      margin-bottom: 40px;
      padding-bottom: 30px;
      border-bottom: 1px solid rgba(180, 160, 140, 0.2);
    }

    .stamp-title {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 300;
      color: var(--ink);
      letter-spacing: 4px;
      margin-bottom: 10px;
    }

    .stamp-subtitle {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--ink-ghost);
      text-transform: uppercase;
    }

    .stamp-visitor-info {
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(180, 160, 140, 0.2);
      padding: 25px 30px;
      margin-bottom: 35px;
    }

    .stamp-info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      font-size: 13px;
    }

    .stamp-info-row:last-child {
      margin-bottom: 0;
    }

    .stamp-info-label {
      font-family: var(--font-mono);
      color: var(--ink-ghost);
      letter-spacing: 2px;
      font-size: 10px;
      text-transform: uppercase;
    }

    .stamp-info-value {
      font-family: var(--font-serif);
      color: var(--ink);
      font-style: italic;
    }

    .stamp-seal-response {
      background: linear-gradient(135deg, rgba(184, 92, 92, 0.08) 0%, rgba(184, 92, 92, 0.03) 100%);
      border-left: 3px solid var(--seal);
      padding: 20px 25px;
      margin-bottom: 35px;
      position: relative;
    }

    .stamp-seal-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--seal);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .stamp-seal-text {
      font-family: var(--font-handwriting);
      font-size: 24px;
      color: var(--ink);
      line-height: 1.5;
    }

    .stamp-traces-section {
      margin-bottom: 35px;
    }

    .stamp-section-title {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--ink-ghost);
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .stamp-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(180, 160, 140, 0.4) 0%, transparent 100%);
    }

    .stamp-traces-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .stamp-trace-item {
      display: flex;
      align-items: flex-start;
      gap: 15px;
      padding: 15px 20px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(180, 160, 140, 0.15);
      transition: all 0.3s ease;
    }

    .stamp-trace-item:hover {
      background: rgba(255, 255, 255, 0.8);
      border-color: rgba(184, 92, 92, 0.2);
      transform: translateX(5px);
    }

    .stamp-trace-channel {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--seal);
      text-transform: uppercase;
      min-width: 80px;
      padding-top: 3px;
    }

    .stamp-trace-text {
      font-family: var(--font-handwriting);
      font-size: 18px;
      color: var(--ink);
      line-height: 1.4;
      flex: 1;
    }

    .stamp-trace-time {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--ink-ghost);
      white-space: nowrap;
    }

    .stamp-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 35px;
      padding: 25px;
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(180, 160, 140, 0.15);
    }

    .stamp-stat {
      text-align: center;
    }

    .stamp-stat-number {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 300;
      color: var(--seal);
      line-height: 1;
      margin-bottom: 8px;
    }

    .stamp-stat-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--ink-ghost);
      text-transform: uppercase;
    }

    .stamp-footer {
      text-align: center;
      padding-top: 30px;
      border-top: 1px solid rgba(180, 160, 140, 0.2);
    }

    .stamp-wax-seal {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: var(--seal);
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--paper);
      font-family: var(--font-sans);
      font-size: 20px;
      letter-spacing: 2px;
      box-shadow: 0 4px 15px rgba(184, 92, 92, 0.3);
      position: relative;
    }

    .stamp-wax-seal::before {
      content: '';
      position: absolute;
      top: -5px;
      left: -5px;
      right: -5px;
      bottom: -5px;

          id: 'highway',

            paragraphs: [
              "后视镜里的世界正在缩小。你以为速度可以稀释思念，但每一个出口都通向同一个目的地——那个你试图逃离的自己。",
              "他的眼睛在暮色中扩张，像两颗即将溺水的月亮。你们共享着某种无法命名的恐惧：关于成长，关于那些注定会失去的东西。",
              "在另一个维度里，你们一定更高大。不受这具身体的束缚，不被这个夏天定义。但此刻，你们只是两个在公路上漂移的影子，等待着黎明的赦免。"

            quote: "I'm sure we're taller in another dimension. You say we're small and not worth the mention",
            accentColor: '#d4a5a5',
            textColor: '#5a4550',
            bgGradient: 'linear-gradient(180deg, rgba(255,240,245,0) 0%, rgba(255,235,240,0.98) 10%, rgba(250,230,235,0.98) 100%)'
          },
          prompt: "十六岁夏天，你想要逃离的是："
        },
        pool: {
          id: 'pool',
          title: '泳池',
          subtitle: 'DREAMLAND',
          type: 'p5',
          sketch: 'dreamlandPoolSketch',
          prose: {
            paragraphs: [
              "水下的世界安静得令人窒息。氯气的刺痛让你想起那些从未说出口的告白，那些在热浪中蒸发的秘密。",
              "西瓜汁的吻在舌尖留下痕迹。你闭上眼睛，让水流带走时间——Dunkaroos的甜腻、Kodak胶片的颗粒、以及那个在得克萨斯州试图理解世界的男孩。",
              "当你浮出水面，世界变得震耳欲聋。但在这震耳欲聋中，你找到了某种奇异的平静：就像那个人从未离开你，蓬勃的爱意仍在热浪中蒸腾。"

            quote: "Pulling down backstreets deep in your head, slipping through dreamland like a tourist",
            accentColor: '#7a9eb8',

          prompt: "你上一次跃入水中，隔绝外界声音只为倾听自己心声的时刻："

    const State = {
      sessionId: null,
      startTime: Date.now(),
      currentLayer: 'seal',
      currentChannel: null,
      sealResponse: null,
      channelTraces: {},
      visited: [],
      p5Instance: null,
      sealBroken: false
    };

    // ============================================
    // 初始化
    // ============================================

    document.addEventListener('DOMContentLoaded', init);

    function init() {
      State.sessionId = generateId();
      const q = CONFIG.questions[Math.floor(Math.random() * CONFIG.questions.length)];
      document.getElementById('seal-question').innerHTML = q;
      updateMarginalia();
      initSummerMemory();
      setInterval(updateTime, 1000);
      const input = document.getElementById('ink-input');
      input.addEventListener('keypress', (e) => { if (e.key === 'Enter') dissolveSeal(); });
      input.focus();
      window.addEventListener('scroll', () => {
        const top = document.getElementById('top-matter');
        if (window.scrollY > 100) top.classList.add('visible');
        else top.classList.remove('visible');
      });
      const closeBtn = document.getElementById('close-page');
      if (closeBtn) {
        closeBtn.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          closePage();
        });
      }
      initTraces();
    }

    function generateId() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let id = '';
      for (let i = 0; i < 8; i++) id += chars[Math.floor(Math.random() * chars.length)];
      return id;
    }

    function updateTime() {
      const elapsed = Date.now() - State.startTime;
      const h = Math.floor(elapsed / 3600000).toString().padStart(2, '0');
      const m = Math.floor((elapsed % 3600000) / 60000).toString().padStart(2, '0');
      const s = Math.floor((elapsed % 60000) / 1000).toString().padStart(2, '0');
      document.getElementById('time-elapsed').textContent = `${h}:${m}:${s}`;
    }

    function updateMarginalia() {
      const words = ['未寄出的', '第17次', '褪色的', '凌晨三点', '后视镜', '冷却的'];
      document.getElementById('marginalia').innerHTML = '此前经过此地的人留下了：' + 
        words.map(w => `<span class="faded-word">${w}</span>`).join('');
    }

    // ============================================
    // 夏日纯白空气背景
    // ============================================

    function initSummerMemory() {
      const canvas = document.getElementById('memory-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);
      function drawLightTexture() {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < 30; i++) {
          const x = Math.random() * canvas.width;
          const y = Math.random() * canvas.height;
          const r = Math.random() * 150 + 80;
          const opacity = Math.random() * 0.03;
          const g = ctx.createRadialGradient(x, y, 0, x, y, r);
          g.addColorStop(0, `rgba(255, 248, 220, ${opacity})`);
          g.addColorStop(0.5, `rgba(255, 245, 230, ${opacity * 0.5})`);
          g.addColorStop(1, 'transparent');
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      drawLightTexture();
      initLightParticles();
    }

    function initLightParticles() {
      const container = document.getElementById('light-particles');
      if (!container) return;
      for (let i = 0; i < 25; i++) {
        const particle = document.createElement('div');
        particle.className = 'light-particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 20 + 's';
        particle.style.animationDuration = (15 + Math.random() * 10) + 's';
        container.appendChild(particle);
      }
    }

    // ============================================
    // 核心功能：拆封
    // ============================================

    function dissolveSeal() {
      if (State.sealBroken) return;
      const input = document.getElementById('ink-input');
      const value = input.value.trim();
      if (!value || value.length < 1) {
        input.classList.add('error');
        setTimeout(() => input.classList.remove('error'), 500);
        return;
      }
      State.sealBroken = true;
      State.sealResponse = value;
      document.getElementById('wax-seal').classList.add('cracked');
      setTimeout(() => {
        document.getElementById('threshold-seal').classList.add('dissolved');
        setTimeout(() => {
          document.getElementById('threshold-seal').style.display = 'none';
          revealAtlas();
        }, 800);
      }, 600);
    }

    function revealAtlas() {
      State.currentLayer = 'atlas';
      const atlas = document.getElementById('star-atlas');
      atlas.style.display = 'block';
      atlas.offsetHeight;
      atlas.classList.add('revealed');
      renderConstellation();
    }

    // ============================================
    // 星图渲染
    // ============================================

    function initTraces() {
      const samples = ['假装在听', '耳鸣', '后视镜', '不敢睁眼', '冷却的咖啡', '未发送', '第17次经过', '凌晨三点'];
      Object.keys(CONFIG.channels).forEach(key => {
        CONFIG.channels[key].traces = [];
        for (let i = 0; i < 5; i++) {
          let text;
          if (key === 'contrail') text = '宝贝，你是什么星座...';
          else if (key === 'lemontree') text = '我原谅你了，妈妈。';
          else if (key === 'highway') text = '美好的十六岁，我又懂得多少。';
          else if (key === 'pool') text = '热浪蒙蔽我的双眼。';
          else text = samples[Math.floor(Math.random() * samples.length)];
          CONFIG.channels[key].traces.push({ text: text, time: Date.now() - Math.random() * 86400000, isOwn: false });
        }
      });
    }

    function renderConstellation() {
      const container = document.getElementById('constellation');
      container.innerHTML = '';
      Object.values(CONFIG.channels).forEach((ch, idx) => {
        const div = document.createElement('div');
        div.className = 'star-entry';
        div.setAttribute('data-channel', ch.id);
        const lastTrace = ch.traces[ch.traces.length - 1];
        div.innerHTML = `
          <div class="entry-number">${String(idx + 1).padStart(2, '0')}</div>
          <div class="entry-title">${ch.title}</div>
          <div class="entry-type">${ch.type} // ${ch.subtitle}</div>
          <div class="entry-trace">${lastTrace ? lastTrace.text : '暂无痕迹'}</div>
        `;
        div.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          openChannel(ch.id);
        });
        div.addEventListener('touchend', function(e) {
          e.preventDefault();
          openChannel(ch.id);
        });
        container.appendChild(div);
      });
    }

    // ============================================
    // 通道打开逻辑
    // ============================================

    function openChannel(channelId) {
      const ch = CONFIG.channels[channelId];
      if (!ch) return;
      State.currentChannel = channelId;
      State.currentLayer = 'page';
      State.visited.push(channelId);

      const visitCount = State.visited.filter(id => id === channelId).length;
      if (visitCount === 1) {
        console.log(`[Channel Summer] 首次进入通道: ${ch.title}`);
      }
      const atlas = document.getElementById('star-atlas');
      atlas.classList.remove('revealed');
      setTimeout(() => {
        atlas.style.display = 'none';
        const page = document.getElementById('open-page');
        page.style.display = 'block';
        void page.offsetHeight;
        page.classList.add('visible');
        document.getElementById('page-location').textContent = ch.title;
        document.getElementById('page-coordinates').textContent = 
          `${ch.subtitle} | ${ch.type.toUpperCase()} | ${new Date().toLocaleTimeString()}`;
        const container = document.getElementById('page-content-container');
        container.innerHTML = '';
        if (State.p5Instance) {
          State.p5Instance.remove();
          State.p5Instance = null;
        }
        if (ch.type === 'chemtrails') {
          renderChemtrailsContent(ch, container);
        } else if (ch.type === 'text') {
          renderTextContent(ch, container);
        } else if (ch.type === 'p5') {
          renderP5Content(ch, container);
        }
      }, 600);
    }

    // ============================================
    // 板块渲染函数
    // ============================================

      heroDiv.appendChild(p5Div);
      content.collagePhotos.forEach(photo => {
        const photoDiv = document.createElement('div');
        photoDiv.className = `collage-photo ${photo.class}`;
        photoDiv.innerHTML = `<img src="${photo.src}" alt="${photo.caption}" loading="lazy">`;
        heroDiv.appendChild(photoDiv);
      });
      content.typewriterTexts.forEach((text, idx) => {
        const typeDiv = document.createElement('div');
        typeDiv.className = `typewriter-layer typewriter-text ${text.position}`;
        typeDiv.style.animationDelay = `${idx * 0.5}s`;

      const stampDiv = document.createElement('div');
      stampDiv.className = 'collage-stamp top-right';
      stampDiv.innerHTML = 'COTCC<br>2021';
      heroDiv.appendChild(stampDiv);
      const scrollHint = document.createElement('div');
      scrollHint.className = 'scroll-hint';
      scrollHint.innerHTML = `
        <div class="scroll-hint-text">SCROLL</div>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 5v14M19 12l-7 7-7-7"/>

      const proseDiv = document.createElement('div');
      proseDiv.className = 'chemtrails-prose';
      content.prose.forEach(para => {
        const p = document.createElement('p');
        p.textContent = para;
        proseDiv.appendChild(p);
      });
      const quoteDiv = document.createElement('div');

    function renderTextContent(ch, container) {
      const passage = document.createElement('div');
      passage.className = 'prose-passage';
      passage.style.maxWidth = '680px';
      passage.style.margin = '0 auto';
      passage.style.padding = '80px 40px';

        const p = document.createElement('p');

          span.className = 'fading-char';
          span.textContent = char;

          if (Math.random() > 0.75) {

    function addMarginSection(ch, container) {
      const marginDiv = document.createElement('div');
      marginDiv.className = 'reader-margin';
      if (ch.id) marginDiv.setAttribute('data-channel', ch.id);

      const userTracesCount = State.channelTraces[ch.id] ? State.channelTraces[ch.id].length : 0;
      const traceHint = userTracesCount > 0 ? 
        `<div style="font-size: 11px; color: var(--seal); margin-bottom: 15px; font-style: italic;">你在此留下了 ${userTracesCount} 个痕迹</div>` : '';

      marginDiv.innerHTML = `
        <div class="margin-prompt">${ch.prompt}</div>
        ${traceHint}
        <div class="margin-form">
          <input type="text" id="margin-input" placeholder="在此处书写你的痕迹..." maxlength="100" autocomplete="off">
          <button type="button" id="leave-trace" onclick="leaveTrace()"><span>钤印</span></button>
        </div>
        <div class="ex-libris">
          <div class="ex-header">Ex Libris // 此前收藏者的痕迹</div>
          <div id="traces-collection"></div>
        </div>
      `;
      container.appendChild(marginDiv);
      renderTraces(ch);
    }

    function renderTraces(ch) {
      const container = document.getElementById('traces-collection');
      if (!container) return;
      container.innerHTML = '';
      const recent = ch.traces.slice(-12).reverse();
      recent.forEach((trace, index) => {
        const stamp = document.createElement('div');
        stamp.className = 'trace-stamp' + (trace.isOwn ? ' own' : '');
        let timeStr = '';
        if (trace.time) {
          const date = new Date(trace.time);
          const now = new Date();
          const diff = now - date;
          if (diff < 60000) timeStr = '刚刚';
          else if (diff < 3600000) timeStr = Math.floor(diff/60000) + '分钟前';
          else if (diff < 86400000) timeStr = Math.floor(diff/3600000) + '小时前';
          else timeStr = (date.getMonth()+1) + '/' + date.getDate();
        }
        stamp.setAttribute('data-time', timeStr);
        stamp.textContent = trace.text.substring(0, 50);
        stamp.style.opacity = '0';
        stamp.style.transform = 'translateX(-10px)';
        container.appendChild(stamp);
        setTimeout(() => {
          stamp.style.transition = 'all 0.5s ease';
          stamp.style.opacity = trace.isOwn ? '1' : '0.85';
          stamp.style.transform = 'translateX(0)';
        }, index * 80);
      });
    }

    function leaveTrace() {
      const input = document.getElementById('margin-input');
      const value = input.value.trim();
      if (!value || !State.currentChannel) return;
      const ch = CONFIG.channels[State.currentChannel];
      const newTrace = { text: value, time: Date.now(), isOwn: true };

      ch.traces.push(newTrace);

      if (!State.channelTraces[State.currentChannel]) {
        State.channelTraces[State.currentChannel] = [];
      }
      State.channelTraces[State.currentChannel].push(value);

      renderTraces(ch);
      input.value = '';
      const margin = document.querySelector('.reader-margin');
      if (margin) {
        margin.style.background = 'linear-gradient(180deg, rgba(255, 250, 245, 1) 0%, rgba(255, 245, 240, 0.98) 100%)';
        setTimeout(() => {
          margin.style.background = '';
        }, 300);
      }
    }

    function closePage() {
      if (State.p5Instance) {
        try { State.p5Instance.remove(); } catch (e) {}
        State.p5Instance = null;
      }
      State.currentChannel = null;
      State.currentLayer = 'atlas';
      const page = document.getElementById('open-page');
      page.classList.remove('visible');
      setTimeout(() => {
        page.style.display = 'none';
        document.getElementById('page-content-container').innerHTML = '';
        const atlas = document.getElementById('star-atlas');
        atlas.style.display = 'block';
        void atlas.offsetHeight;
        atlas.classList.add('revealed');
        window.scrollTo(0, 0);
        renderConstellation();
      }, 600);
    }
    // ============================================
    // P5草图定义
    // ============================================

    // 飞机云草图
    window.chemtrailsSketch = function(p) {
      let clouds = [];
      let planes = [];
      let particles = [];
      let lightLeaks = [];
      let time = 0;
      let canvas;
      let lyrics = [];
      let lyricsStartTime = 0;
      let dissolvingLetters = [];
      let mvImages = [];
      let polaroids = [];

      const lyricsText = [
        "You're in the wind, I'm in the water",
        "Nobody's son, nobody's daughter",
        "Watching the chemtrails over the country club",
        "Suburbia, The Brentwood Market",
        "What to do next? Maybe we'll love it",
        "White picket chemtrails over the country club"
      ];

      p.setup = function() {
        const container = document.getElementById('chemtrails-p5-canvas');
        if (!container) return;
        canvas = p.createCanvas(container.offsetWidth, container.offsetHeight);
        p.pixelDensity(1);

        for (let i = 0; i < lyricsText.length; i++) {
          lyrics.push({
            text: lyricsText[i],
            alpha: 0,
            targetAlpha: 220,
            delay: i * 800,
            y: 0
          });
        }

        initMVImages();
        initPolaroids();

        for (let i = 0; i < 8; i++) {
          lightLeaks.push({
            x: p.random(p.width),
            y: p.random(p.height),
            size: p.random(100, 300),
            opacity: p.random(20, 60),
            pulseSpeed: p.random(0.5, 1.5),
            phase: p.random(p.TWO_PI)
          });
        }
        for (let i = 0; i < 120; i++) {
          particles.push({
            x: p.random(p.width),
            y: p.random(p.height),
            size: p.random(1, 4),
            vx: p.random(-0.3, 0.3),
            vy: p.random(-0.15, 0.15),
            alpha: p.random(20, 70),
            twinkle: p.random(p.TWO_PI)
          });
        }
        spawnPlane();

        lyricsStartTime = p.millis() + 2000;
      };

      function initMVImages() {
        const imageData = [
          {
            url: 'https://kimi-web-img.moonshot.cn/img/i0.wp.com/6e590c6b30aa3fd125fc941364ccefced0d297f3.jpg',
            x: 0.78, y: 0.12, w: 200, h: 130,
            rotation: -0.08, delay: 1000, alpha: 180
          },
          {
            url: 'https://kimi-web-img.moonshot.cn/img/everlastingfabric.com/c2cd95f770a67ef40eb907a8cb4a32db8af517a4.jpg',
            x: 0.68, y: 0.38, w: 170, h: 170,
            rotation: 0.05, delay: 1800, alpha: 190
          },
          {
            url: 'https://kimi-web-img.moonshot.cn/img/pyxis.nymag.com/9f94da90efdcc0d57249ea3a3283297a1e7ddc5c.jpg',
            x: 0.85, y: 0.58, w: 160, h: 110,
            rotation: -0.12, delay: 2600, alpha: 170
          },
          {
            url: 'https://kimi-web-img.moonshot.cn/img/www.mydomaine.com/6a336e8bac595636dffccef19e201cd56d02ef4e.jpg',
            x: 0.72, y: 0.78, w: 220, h: 140,
            rotation: 0.06, delay: 3400, alpha: 160
          }
        ];

        for (let i = 0; i < imageData.length; i++) {
          let img = p.createImg(imageData[i].url, '');
          img.hide();

          mvImages.push({
            element: img,
            x: p.width * imageData[i].x,
            y: p.height * imageData[i].y,
            w: imageData[i].w,
            h: imageData[i].h,
            rotation: imageData[i].rotation,
            alpha: 0,
            targetAlpha: imageData[i].alpha,
            delay: imageData[i].delay,
            loaded: false,
            floatPhase: p.random(p.TWO_PI),
            floatSpeed: p.random(0.3, 0.8)
          });

          img.elt.onload = function() {
            mvImages[i].loaded = true;
          };
        }
      }

      function initPolaroids() {
        const polaroidData = [
          { x: 0.62, y: 0.25, rot: -0.25, delay: 1500 },
          { x: 0.88, y: 0.42, rot: 0.18, delay: 2300 },
          { x: 0.58, y: 0.65, rot: 0.22, delay: 3100 },
          { x: 0.92, y: 0.72, rot: -0.15, delay: 3900 },
          { x: 0.65, y: 0.88, rot: 0.1, delay: 4700 }
        ];

        for (let i = 0; i < polaroidData.length; i++) {
          polaroids.push({
            x: p.width * polaroidData[i].x,
            y: p.height * polaroidData[i].y,
            w: 100,
            h: 120,
            rotation: polaroidData[i].rot,
            alpha: 0,
            targetAlpha: p.random(80, 140),
            delay: polaroidData[i].delay,
            floatPhase: p.random(p.TWO_PI),
            color: p.random(['#f5f5f5', '#fafafa', '#fffef0'])
          });
        }
      }

      function spawnPlane() {
        const y = p.random(p.height * 0.1, p.height * 0.4);
        planes.push({
          x: -40,
          y: y,
          speed: p.random(0.6, 1.4),
          trailTimer: 0,
          wingAngle: 0
        });
      }

      p.draw = function() {
        time += 0.006;

        for (let y = 0; y < p.height; y++) {
          let inter = p.map(y, 0, p.height, 0, 1);
          let r = p.lerp(232, 140, inter);
          let g = p.lerp(221, 175, inter);
          let b = p.lerp(212, 195, inter);
          p.stroke(r, g, b);
          p.line(0, y, p.width, y);
        }

        p.noStroke();
        p.blendMode(p.ADD);
        lightLeaks.forEach(leak => {
          let pulse = p.sin(time * leak.pulseSpeed + leak.phase) * 0.5 + 0.5;
          let currentOpacity = leak.opacity * pulse;
          let g = p.drawingContext.createRadialGradient(
            leak.x, leak.y, 0,
            leak.x, leak.y, leak.size
          );
          g.addColorStop(0, `rgba(255, 250, 240, ${currentOpacity/255})`);
          g.addColorStop(0.5, `rgba(255, 245, 230, ${currentOpacity*0.5/255})`);
          g.addColorStop(1, 'transparent');
          p.drawingContext.fillStyle = g;
          p.circle(leak.x, leak.y, leak.size * 2);
          leak.x += p.sin(time * 0.2 + leak.phase) * 0.3;
          leak.y += p.cos(time * 0.15 + leak.phase) * 0.2;
        });
        p.blendMode(p.BLEND);

        drawMVImages();
        drawPolaroids();

        particles.forEach(pt => {
          pt.x += pt.vx + p.sin(time + pt.y * 0.01) * 0.15;
          pt.y += pt.vy;
          pt.twinkle += 0.02;
          if (pt.x < 0) pt.x = p.width;
          if (pt.x > p.width) pt.x = 0;
          if (pt.y < 0) pt.y = p.height;
          if (pt.y > p.height) pt.y = 0;
          let twinkleAlpha = pt.alpha + p.sin(pt.twinkle) * 20;
          p.fill(255, 255, 245, twinkleAlpha);
          p.noStroke();
          p.circle(pt.x, pt.y, pt.size);
        });

        for (let i = clouds.length - 1; i >= 0; i--) {
          let cloud = clouds[i];
          cloud.x += cloud.vx + p.sin(time * 0.5 + cloud.y * 0.01) * 0.08;
          cloud.y += cloud.vy;
          cloud.life -= 0.6;
          cloud.size += 0.12;
          cloud.opacity = p.map(cloud.life, 0, 255, 0, cloud.maxOpacity);
          if (cloud.life <= 0) {
            clouds.splice(i, 1);
            continue;
          }
          let steps = 10;
          for (let j = 0; j < steps; j++) {
            let ratio = j / steps;
            let alpha = cloud.opacity * (1 - ratio) * 0.25;
            let size = cloud.size * (1 + ratio * 0.6);
            let offsetX = p.sin(time * 2 + j) * (j * 0.5);
            let offsetY = p.cos(time * 1.5 + j) * (j * 0.3);
            p.fill(255, 255, 252, alpha);
            p.circle(cloud.x + offsetX, cloud.y + offsetY, size);
          }
        }

        for (let i = planes.length - 1; i >= 0; i--) {
          let plane = planes[i];
          plane.x += plane.speed;
          plane.trailTimer++;
          plane.wingAngle = p.sin(time * 3) * 0.05;
          if (plane.trailTimer % 2 === 0) {
            clouds.push({
              x: plane.x - 5,
              y: plane.y + 3,
              vx: p.random(-0.08, 0.08),
              vy: p.random(0.01, 0.04),
              size: p.random(10, 18),
              life: 180 + p.random(60),
              maxOpacity: p.random(80, 130)
            });
            clouds.push({
              x: plane.x + 5,
              y: plane.y + 3,
              vx: p.random(-0.08, 0.08),
              vy: p.random(0.01, 0.04),
              size: p.random(10, 18),
              life: 180 + p.random(60),
              maxOpacity: p.random(80, 130)
            });
          }
          p.push();
          p.translate(plane.x, plane.y);
          p.rotate(plane.wingAngle);
          p.noStroke();
          p.fill(100, 110, 120, 40);
          p.ellipse(2, 2, 22, 7);
          p.fill(140, 145, 150, 180);
          p.ellipse(0, 0, 20, 6);
          p.fill(130, 135, 140, 160);
          p.ellipse(-2, 0, 6, 16);
          p.fill(120, 125, 130, 170);
          p.ellipse(-8, -2, 4, 5);
          p.pop();
          if (plane.x > p.width + 40) {
            planes.splice(i, 1);
          }
        }
        if (p.random(1) < 0.002 && planes.length < 2) {
          spawnPlane();
        }

        let vignette = p.drawingContext.createRadialGradient(
          p.width/2, p.height/2, p.height * 0.25,
          p.width/2, p.height/2, p.height * 0.9
        );
        vignette.addColorStop(0, 'transparent');
        vignette.addColorStop(1, 'rgba(160, 140, 120, 0.12)');
        p.drawingContext.fillStyle = vignette;
        p.noStroke();
        p.rect(0, 0, p.width, p.height);

        drawLyrics();
        drawDissolvingLetters();

        if (p.mouseIsPressed) {
          for (let k = 0; k < 5; k++) {
            clouds.push({
              x: p.mouseX + p.random(-40, 40),
              y: p.mouseY + p.random(-40, 40),
              vx: p.random(-0.15, 0.15),
              vy: p.random(-0.08, 0.08),
              size: p.random(50, 100),
              life: 120,
              maxOpacity: p.random(60, 100)
            });
          }
        }
      };

      function drawMVImages() {
        let currentTime = p.millis();

        mvImages.forEach((img, index) => {
          if (!img.loaded) return;

          if (currentTime > lyricsStartTime + img.delay) {
            if (img.alpha < img.targetAlpha) {
              img.alpha += 1.5;
            }

            let floatY = p.sin(time * img.floatSpeed + img.floatPhase) * 8;

            p.push();
            p.translate(img.x, img.y + floatY);
            p.rotate(img.rotation + p.sin(time * 0.5 + index) * 0.015);

            p.rect(10, 10, img.w, img.h);

        p.textAlign(p.LEFT, p.TOP);
        p.textFont('Georgia');
        p.textSize(17);
        p.textStyle(p.ITALIC);

        let lineHeight = 26;

        for (let i = 0; i < lyrics.length; i++) {
          let line = lyrics[i];

          let lineStartTime = lyricsStartTime + line.delay;

          if (currentTime > lineStartTime) {
            let fadeProgress = p.map(currentTime, lineStartTime, lineStartTime + 1000, 0, 1, true);
            fadeProgress = 1 - Math.pow(1 - fadeProgress, 3);
            line.alpha = fadeProgress * line.targetAlpha;

          let baseColor = 75 + i * 8;
          let y = lyricsY + i * lineHeight;

          p.fill(255, 255, 255, line.alpha * 0.25);
          p.text(line.text, lyricsX + 1, y + 1);

          p.fill(baseColor, baseColor - 8, baseColor - 15, line.alpha);
          p.text(line.text, lyricsX, y);

          if (line.alpha > 100 && p.random(1) < 0.018) {
            let charIndex = Math.floor(p.random(line.text.length));
            let char = line.text[charIndex];
            if (char !== ' ') {
              let charWidth = p.textWidth(line.text.substring(0, charIndex));
              let letterX = lyricsX + charWidth;
              let letterY = y;

              dissolvingLetters.push({
                char: char,
                x: letterX,
                y: letterY,
                vx: p.random(-0.5, 0.5),
                vy: p.random(-0.3, -0.8),
                alpha: line.alpha,
                size: 17,
                rotation: p.random(-0.2, 0.2),
                rotSpeed: p.random(-0.02, 0.02),
                life: 1.0,

      function drawDissolvingLetters() {
        p.push();
        p.textFont('Georgia');
        p.textSize(17);
        p.textStyle(p.ITALIC);
        p.textAlign(p.LEFT, p.TOP);

        for (let i = dissolvingLetters.length - 1; i >= 0; i--) {
          let letter = dissolvingLetters[i];

          letter.x += letter.vx;
          letter.y += letter.vy;
          letter.rotation += letter.rotSpeed;
          letter.life -= letter.decay;
          letter.alpha = letter.life * 220;

          if (letter.life <= 0) {
            dissolvingLetters.splice(i, 1);
            continue;
          }

          p.push();
          p.translate(letter.x, letter.y);
          p.rotate(letter.rotation);

          let blurAmount = (1 - letter.life) * 4;
          if (blurAmount > 0) {
            p.drawingContext.filter = `blur(${blurAmount}px)`;
          }

          p.fill(letter.color[0], letter.color[1], letter.color[2], letter.alpha);
          p.text(letter.char, 0, 0);

          p.fill(letter.color[0], letter.color[1], letter.color[2], letter.alpha * 0.25);
          p.text(letter.char, 1, 1);

          p.drawingContext.filter = 'none';
          p.pop();
        }

        p.pop();
      }

          r = p.lerp(100, 150, t);
          g = p.lerp(180, 255, t);

            g = p.lerp(220, 180, t);

          } else if (inter < 0.6) {
            let t = (inter - 0.3) / 0.3;
            r = 255;
            g = p.lerp(180, 140, t);
            b = p.lerp(200, 160, t);

            r = p.lerp(255, 120, t);

        for (let y = roadTop; y < roadBottom; y++) {

          let roadWidth = p.lerp(roadWidthTop, roadWidthBottom, inter);
          let centerX = p.width * 0.5;

          let brightness = p.lerp(60, 30, inter);
          p.stroke(brightness);
          p.line(centerX - roadWidth/2, y, centerX + roadWidth/2, y);

      function updateAndDrawFloatingLyrics() {
        let currentTime = p.millis();

        floatingLyrics.forEach((lyric, index) => {
          if (lyric.state === 'waiting' && currentTime > lyric.startTime) {
            lyric.state = 'rising';
          }

          if (lyric.state === 'rising') {
            lyric.y += lyric.driftY * 1.5;
            lyric.alpha = p.min(lyric.alpha + 4, 255);

            if (lyric.y <= lyric.targetY) {
              lyric.state = 'floating';
              lyric.floatStartTime = currentTime;

          else if (lyric.state === 'floating') {
            lyric.x += lyric.driftX + p.sin(time + index) * 0.3;

            if (currentTime - lyric.floatStartTime > 6000) {
              lyric.state = 'fading';

          else if (lyric.state === 'fading') {
            lyric.x += lyric.driftX;
            lyric.y += lyric.driftY * 0.8;
            lyric.alpha -= 1.5;

            if (lyric.alpha <= 0) {
              lyric.state = 'finished';

          if (lyric.alpha > 0 && lyric.state !== 'waiting' && lyric.state !== 'finished') {

          lyric.lines.forEach((line, lineIndex) => {
            let y = startY + lineIndex * lyric.lineHeight;
            p.text(line, 0, y);
          });
        }

        // 绘制主文字
        p.drawingContext.shadowBlur = 0;
        p.fill(255, 255, 255, lyric.alpha);

        lyric.lines.forEach((line, lineIndex) => {
          let y = startY + lineIndex * lyric.lineHeight;
          p.text(line, 0, y);
        });

        // 绘制歌曲名
        p.fill(255, 255, 255, lyric.alpha * 0.7);
        p.textSize(11);
        p.textStyle(p.ITALIC);
        p.text(lyric.text, 0, startY + totalHeight / 2 + 20);

        p.pop();
      }
