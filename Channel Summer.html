        { text: "I can barely hear a sound", album: "It is All So Incredibly Loud", delay: 44000 },
        { text: "It is all so incredibly loud", album: "It is All So Incredibly Loud", delay: 46000 },
        { text: "Helium", album: "Helium", delay: 49000 },
        { text: "Float away with me", album: "Helium", delay: 51000 },
        { text: "You float away with me", album: "Helium", delay: 53000 }
      ];

      p.setup = function() {
        p.createCanvas(p.windowWidth, p.windowHeight);
        p.pixelDensity(1);
        initTiles();
        initFlamingo();
        initSunSpot();
        initPlantShadows();
        initLyrics();
        initGiantLeaves();
        initPoolFloats();

        for (let i = 0; i < 50; i++) {
          particles.push({
            x: p.random(p.width),
            y: p.random(p.height),
            size: p.random(2, 6),
            vx: p.random(-0.3, 0.3),
            vy: p.random(-0.2, 0.2),
            alpha: p.random(30, 80),
            color: p.random() > 0.5 ? colors.neonPink : colors.neonCyan
          });
        }

        lastLyricTime = p.millis();
      };

      let lastLyricTime = 0;

      function initGiantLeaves() {
        giantLeaves = [];

        for (let i = 0; i < 8; i++) {
          giantLeaves.push({
            x: p.random(-50, 100),
            y: p.random(p.height * 0.1, p.height * 0.9),
            size: p.random(150, 280),
            angle: p.random(-0.3, 0.3),
            type: 'palm',
            side: 'left',
            swaySpeed: p.random(0.005, 0.012),
            swayPhase: p.random(p.TWO_PI),
            color: p.random() > 0.5 ? colors.giantLeafDark : colors.giantLeafMid
          });
        }

        for (let i = 0; i < 8; i++) {
          giantLeaves.push({
            x: p.random(p.width - 100, p.width + 50),
            y: p.random(p.height * 0.1, p.height * 0.9),
            size: p.random(150, 280),
            angle: p.random(-0.3, 0.3),
            type: 'palm',
            side: 'right',
            swaySpeed: p.random(0.005, 0.012),
            swayPhase: p.random(p.TWO_PI),
            color: p.random() > 0.5 ? colors.giantLeafDark : colors.giantLeafMid
          });
        }

        for (let i = 0; i < 5; i++) {
          giantLeaves.push({
            x: p.random(p.width * 0.1, p.width * 0.9),
            y: p.random(-80, 50),
            size: p.random(180, 300),
            angle: p.random(-0.5, 0.5),
            type: 'monstera',
            side: 'top',
            swaySpeed: p.random(0.004, 0.01),
            swayPhase: p.random(p.TWO_PI),
            color: colors.giantLeafLight
          });
        }

        for (let i = 0; i < 6; i++) {
          giantLeaves.push({
            x: p.random(p.width * 0.05, p.width * 0.95),
            y: p.random(p.height - 80, p.height + 30),
            size: p.random(160, 260),
            angle: p.random(-0.4, 0.4),
            type: 'fern',
            side: 'bottom',
            swaySpeed: p.random(0.006, 0.015),
            swayPhase: p.random(p.TWO_PI),
            color: colors.giantLeafMid
          });
        }
      }

      function initPoolFloats() {
        poolFloats = [];
        const floatTypes = ['ring', 'mattress', 'ball', 'donut', 'unicorn'];

        for (let i = 0; i < 12; i++) {
          let type = p.random(floatTypes);

          poolFloats.push({
            x: p.random(p.width * 0.15, p.width * 0.85),
            y: p.random(p.height * 0.15, p.height * 0.85),
            size: p.random(40, 90),
            type: type,
            color: p.random([colors.floatPink, colors.floatYellow, colors.floatBlue, colors.floatOrange]),
            vx: p.random(-0.3, 0.3),
            vy: p.random(-0.2, 0.2),
            rotation: p.random(p.TWO_PI),
            rotSpeed: p.random(-0.01, 0.01),
            floatPhase: p.random(p.TWO_PI),
            floatSpeed: p.random(0.008, 0.015)
          });
        }
      }

      function initLyrics() {
        lyrics = lyricsData.map((data, index) => ({
          ...data,
          alpha: 0,
          targetAlpha: 255,
          x: p.random(p.width * 0.1, p.width * 0.8),
          y: p.random(p.height * 0.2, p.height * 0.7),
          floatPhase: p.random(p.TWO_PI),
          floatSpeed: p.random(0.005, 0.015),
          ripplePhase: 0,
          isActive: false,
          hasRippled: false
        }));
      }

      function initPlantShadows() {
        plantShadows = [];
        const shadowCount = 12;
        for (let i = 0; i < shadowCount; i++) {
          let side = Math.floor(p.random(4));
          let x, y, angle;
          switch(side) {
            case 0:
              x = p.random(p.width);
              y = p.random(-50, 100);
              angle = p.random(p.PI * 0.3, p.PI * 0.7);
              break;
            case 1:
              x = p.random(p.width - 100, p.width + 50);
              y = p.random(p.height);
              angle = p.random(p.PI * 0.8, p.PI * 1.2);
              break;
            case 2:
              x = p.random(p.width);
              y = p.random(p.height - 100, p.height + 50);
              angle = p.random(-p.PI * 0.3, p.PI * 0.3);
              break;
            case 3:
              x = p.random(-50, 100);
              y = p.random(p.height);
              angle = p.random(-p.PI * 0.2, p.PI * 0.2);
              break;
          }
          plantShadows.push({
            x: x, y: y, baseAngle: angle,
            swaySpeed: p.random(0.008, 0.025),
            swayPhase: p.random(p.TWO_PI),
            leafCount: Math.floor(p.random(5, 12)),
            leafSize: p.random(40, 80),
            type: p.random() > 0.5 ? 'palm' : 'fern',
            opacity: p.random(25, 45)
          });
        }
      }

      function initFlamingo() {
        flamingo = {
          x: p.width * 0.82,
          y: p.height * 0.18,
          size: 200,
          rotation: -0.15,
          floatOffset: 0,
          floatSpeed: 0.02
        };
      }

      function initSunSpot() {
        sunSpot = {
          x: p.width * 0.5,
          y: p.height * 0.5,
          radius: 150,
          alpha: 30,
          pulseSpeed: 0.5
        };
      }

      function initTiles() {
        tiles = [];
        let tileSize = 40;
        let rows = p.ceil(p.height / tileSize) + 2;
        let cols = p.ceil(p.width / tileSize) + 2;
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            let isBlue = (r + c) % 2 === 0;
            let baseColor = isBlue ? 
              [p.random(100, 140), p.random(180, 220), p.random(240, 255)] :
              [p.random(240, 255), p.random(220, 240), p.random(230, 245)];
            tiles.push({
              x: c * tileSize - tileSize,
              y: r * tileSize - tileSize,
              size: tileSize,
              baseColor: baseColor,
              distortion: p.random(0, 0.3),
              wavePhase: p.random(p.TWO_PI)
            });
          }
        }
      }

      p.draw = function() {
        time += 0.02;

        if (flamingo) {
          flamingo.floatOffset = p.sin(time * 1.5) * 6;
        }
        if (sunSpot) {
          sunSpot.alpha = 20 + p.sin(time * sunSpot.pulseSpeed) * 15;
          sunSpot.x = p.width * 0.5 + p.cos(time * 0.3) * 100;
          sunSpot.y = p.height * 0.5 + p.sin(time * 0.2) * 80;
        }
        plantShadows.forEach(shadow => {
          shadow.swayPhase += shadow.swaySpeed;
        });

        drawSkyReflection();
        drawUnderwaterTiles();
        drawSunSpotOnPoolFloor();
        drawPlantShadows();
        drawGiantLeaves();
        drawRipples();
        updateAndDrawPoolFloats();
        drawLyricsWithRipple();
        drawLyricParticles();
        drawParticles();
        drawFlamingo();
        drawWaterSurface();
        updateLyrics();

        if (p.frameCount % 120 === 0) {
          addRipple(p.random(p.width), p.random(p.height), p.random(30, 80));
        }
      };

      function drawGiantLeaves() {
        giantLeaves.forEach(leaf => {
          let swayAngle = p.sin(time * leaf.swaySpeed + leaf.swayPhase) * 0.15;
          let currentAngle = leaf.angle + swayAngle;

          p.push();
          p.translate(leaf.x, leaf.y);
          p.rotate(currentAngle);

          if (leaf.type === 'palm') {
            drawGiantPalmLeaf(leaf);
          } else if (leaf.type === 'monstera') {
            drawGiantMonsteraLeaf(leaf);
          } else {
            drawGiantFernLeaf(leaf);
          }

          p.pop();
        });
      }

      function drawGiantPalmLeaf(leaf) {
        p.fill(leaf.color[0], leaf.color[1], leaf.color[2], 200);
        p.noStroke();

        let segments = 12;
        let segmentLength = leaf.size / segments;

        p.stroke(leaf.color[0] - 20, leaf.color[1] - 20, leaf.color[2] - 20, 180);
        p.strokeWeight(4);
        p.line(0, 0, leaf.side === 'left' ? leaf.size : -leaf.size, 0);

        for (let i = 0; i < segments; i++) {
          let x = (leaf.side === 'left' ? 1 : -1) * i * segmentLength;
          let width = p.map(i, 0, segments, leaf.size * 0.4, leaf.size * 0.1);

          p.fill(leaf.color[0], leaf.color[1], leaf.color[2], 180 - i * 10);

          p.beginShape();
          p.vertex(x, 0);
          p.vertex(x + segmentLength * 0.8, -width/2);
          p.vertex(x + segmentLength, 0);
          p.vertex(x + segmentLength * 0.8, width/2);
          p.endShape(p.CLOSE);
        }
      }

      function drawGiantMonsteraLeaf(leaf) {
        p.fill(leaf.color[0], leaf.color[1], leaf.color[2], 220);
        p.noStroke();

        let w = leaf.size;
        let h = leaf.size * 1.2;

        p.beginShape();
        p.vertex(0, -h/2);
        p.bezierVertex(w/3, -h/2, w/2, -h/6, w/2, 0);
        p.bezierVertex(w/2, h/6, w/3, h/2, 0, h/2);
        p.bezierVertex(-w/3, h/2, -w/2, h/6, -w/2, 0);
        p.bezierVertex(-w/2, -h/6, -w/3, -h/2, 0, -h/2);
        p.endShape(p.CLOSE);

        p.fill(100, 150, 200, 100);
        p.circle(-w/6, -h/8, w/8);
        p.circle(w/5, h/10, w/10);
        p.circle(0, h/6, w/12);

        p.stroke(leaf.color[0] - 30, leaf.color[1] - 30, leaf.color[2] - 30, 150);
        p.strokeWeight(3);
        p.line(0, -h/2, 0, h/2);
        p.line(0, 0, w/3, -h/4);
        p.line(0, 0, -w/3, -h/4);
      }

      function drawGiantFernLeaf(leaf) {
        p.fill(leaf.color[0], leaf.color[1], leaf.color[2], 200);
        p.noStroke();

        let segments = 15;
        let segmentLength = leaf.size / segments;

        p.stroke(leaf.color[0] - 10, leaf.color[1] - 10, leaf.color[2] - 10, 160);
        p.strokeWeight(3);
        p.line(0, 0, 0, -leaf.size);

        for (let i = 0; i < segments; i++) {
          let y = -i * segmentLength;
          let pinnaWidth = p.map(i, 0, segments, leaf.size * 0.25, leaf.size * 0.05);

          p.fill(leaf.color[0], leaf.color[1], leaf.color[2], 170 - i * 8);

          p.ellipse(-pinnaWidth/2, y, pinnaWidth, segmentLength * 0.8);
          p.ellipse(pinnaWidth/2, y, pinnaWidth, segmentLength * 0.8);
        }
      }

      function updateAndDrawPoolFloats() {
        poolFloats.forEach(floatItem => {
          floatItem.x += floatItem.vx + p.sin(time + floatItem.floatPhase) * 0.3;
          floatItem.y += floatItem.vy + p.cos(time * 0.8 + floatItem.floatPhase) * 0.2;
          floatItem.rotation += floatItem.rotSpeed;

          if (floatItem.x < 50) floatItem.x = 50;
          if (floatItem.x > p.width - 50) floatItem.x = p.width - 50;
          if (floatItem.y < 50) floatItem.y = 50;
          if (floatItem.y > p.height - 50) floatItem.y = p.height - 50;

          p.push();
          p.translate(floatItem.x, floatItem.y);
          p.rotate(floatItem.rotation);

          p.fill(0, 0, 0, 30);
          p.noStroke();
          p.ellipse(5, 5, floatItem.size, floatItem.size * 0.6);

          switch(floatItem.type) {
            case 'ring':
              drawFloatRing(floatItem);
              break;
            case 'mattress':
              drawFloatMattress(floatItem);
              break;
            case 'ball':
              drawFloatBall(floatItem);
              break;
            case 'donut':
              drawFloatDonut(floatItem);
              break;
            case 'unicorn':
              drawFloatUnicorn(floatItem);
              break;
          }

          p.pop();
        });
      }

      function drawFloatRing(item) {
        p.fill(item.color[0], item.color[1], item.color[2], 200);
        p.noStroke();
        p.ellipse(0, 0, item.size, item.size * 0.6);
        p.fill(100, 150, 200, 80);
        p.ellipse(0, 0, item.size * 0.5, item.size * 0.3);
        p.fill(255, 255, 255, 100);
        p.ellipse(-item.size * 0.15, -item.size * 0.1, item.size * 0.2, item.size * 0.1);
      }

      function drawFloatMattress(item) {
        p.fill(item.color[0], item.color[1], item.color[2], 180);
        p.noStroke();

        let w = item.size * 1.2;
        let h = item.size * 0.5;

        p.rect(-w/2, -h/2, w, h, 10);

        p.fill(item.color[0] + 20, item.color[1] + 20, item.color[2] + 20, 200);
        p.rect(-w/2 + 10, -h/2 + 5, w * 0.25, h - 10, 5);

        p.stroke(255, 255, 255, 60);
        p.strokeWeight(1);
        for (let i = 1; i < 4; i++) {
          p.line(-w/2 + w * 0.3, -h/2 + i * h/4, w/2 - 10, -h/2 + i * h/4);
        }
      }

      function drawFloatBall(item) {
        let r = item.size * 0.4;

        p.fill(0, 0, 0, 20);
        p.ellipse(5, 5, r * 2, r * 2);

        let segments = 6;
        for (let i = 0; i < segments; i++) {
          let startAngle = i * p.TWO_PI / segments;
          let endAngle = (i + 1) * p.TWO_PI / segments;

          let c = i % 2 === 0 ? item.color : [255, 255, 255];
          p.fill(c[0], c[1], c[2], 220);

          p.arc(0, 0, r * 2, r * 2, startAngle, endAngle);
        }

        p.fill(255, 255, 255, 150);
        p.ellipse(-r * 0.3, -r * 0.3, r * 0.4, r * 0.3);
      }

      function drawFloatDonut(item) {
        p.fill(item.color[0], item.color[1], item.color[2], 200);
        p.noStroke();
        p.ellipse(0, 0, item.size, item.size * 0.7);
        p.fill(100, 150, 200, 80);
        p.ellipse(0, 0, item.size * 0.35, item.size * 0.25);

        p.fill(255, 255, 255, 200);
        for (let i = 0; i < 8; i++) {
          let angle = i * p.TWO_PI / 8;
          let x = p.cos(angle) * item.size * 0.35;
          let y = p.sin(angle) * item.size * 0.25;
          p.circle(x, y, 3);
        }
      }

      function drawFloatUnicorn(item) {
        p.fill(item.color[0], item.color[1], item.color[2], 200);
        p.noStroke();
        p.ellipse(0, 0, item.size, item.size * 0.5);
        p.ellipse(-item.size * 0.35, -item.size * 0.1, item.size * 0.4, item.size * 0.3);

        p.fill(255, 220, 100, 220);
        p.triangle(
          -item.size * 0.45, -item.size * 0.2,
          -item.size * 0.4, -item.size * 0.35,
          -item.size * 0.35, -item.size * 0.2
        );

        p.fill(255, 255, 255, 180);
        p.circle(-item.size * 0.25, -item.size * 0.15, item.size * 0.15);
        p.circle(-item.size * 0.2, -item.size * 0.25, item.size * 0.12);

        p.circle(item.size * 0.45, 0, item.size * 0.12);
      }

      function updateLyrics() {
        let currentTime = p.millis();

        lyrics.forEach((lyric, index) => {
          let triggerTime = lyric.delay;

          if (currentTime > triggerTime && !lyric.isActive) {
            lyric.isActive = true;
            lyric.alpha = 0;

            if (!lyric.hasRippled) {
              createLyricRipple(lyric);
              lyric.hasRippled = true;
            }
          }

          if (lyric.isActive) {
            if (lyric.alpha < lyric.targetAlpha) {
              lyric.alpha += 3;
            }

            if (currentTime > triggerTime + 5000) {
              lyric.alpha -= 2;
              if (lyric.alpha <= 0) {
                lyric.isActive = false;
              }
            }
          }

          lyric.ripplePhase += 0.02;
        });
      }

      function createLyricRipple(lyric) {
        ripples.push({
          x: lyric.x,
          y: lyric.y,
          radius: 10,
          maxRadius: 120,
          speed: 2,
          alpha: 180,
          lineWidth: 3,
          isLyricRipple: true,
          lyricText: lyric.text,
          lyricColor: colors.dreamPink
        });

        let chars = lyric.text.split('');
        chars.forEach((char, i) => {
          if (char !== ' ') {
            lyricParticles.push({
              char: char,
              x: lyric.x,
              y: lyric.y,
              vx: p.random(-1.5, 1.5),
              vy: p.random(-1, -2.5),
              alpha: 255,
              size: p.random(14, 20),
              rotation: p.random(-0.3, 0.3),
              rotSpeed: p.random(-0.05, 0.05),
              life: 1.0,
              decay: p.random(0.008, 0.015),
              floatPhase: p.random(p.TWO_PI),
              color: p.random() > 0.5 ? colors.dreamPink : colors.dreamCyan
            });
          }
        });
      }

      function drawLyricsWithRipple() {
        p.push();

        lyrics.forEach(lyric => {
          if (lyric.alpha > 0) {
            let floatY = p.sin(time * lyric.floatSpeed + lyric.floatPhase) * 8;
            let floatX = p.cos(time * lyric.floatSpeed * 0.7 + lyric.floatPhase) * 5;
            let rippleDistortion = p.sin(lyric.ripplePhase) * 3;

            let x = lyric.x + floatX + rippleDistortion;
            let y = lyric.y + floatY;

            p.push();
            p.translate(x, y);

            let blurAmount = p.map(lyric.alpha, 0, 255, 2, 0);
            if (blurAmount > 0) {
              p.drawingContext.filter = `blur(${blurAmount}px)`;
            }

            p.fill(colors.waterDeep[0], colors.waterDeep[1], colors.waterDeep[2], lyric.alpha * 0.3);
            p.textAlign(p.CENTER, p.CENTER);
            p.textFont('Georgia');
            p.textSize(22);
            p.textStyle(p.ITALIC);
            p.text(lyric.text, 3, 3);

            let textColor = p.random() > 0.5 ? colors.dreamPink : colors.dreamCyan;
            p.fill(textColor[0], textColor[1], textColor[2], lyric.alpha);
            p.text(lyric.text, 0, 0);

            p.drawingContext.filter = 'none';
            p.fill(textColor[0], textColor[1], textColor[2], lyric.alpha * 0.3);
            p.text(lyric.text, 0, 0);

            p.pop();
          }
        });

        p.pop();
      }

      function drawLyricParticles() {
        p.push();

        for (let i = lyricParticles.length - 1; i >= 0; i--) {
          let particle = lyricParticles[i];

          particle.x += particle.vx;
          particle.y += particle.vy;
          particle.rotation += particle.rotSpeed;
          particle.life -= particle.decay;

          particle.vx *= 0.99;
          particle.vy *= 0.99;

          let floatY = p.sin(time * 2 + particle.floatPhase) * 2;

          if (particle.life <= 0) {
            lyricParticles.splice(i, 1);
            continue;
          }

          particle.alpha = particle.life * 255;

          p.push();
          p.translate(particle.x, particle.y + floatY);
          p.rotate(particle.rotation);

          let blurAmount = (1 - particle.life) * 4;
          if (blurAmount > 0) {
            p.drawingContext.filter = `blur(${blurAmount}px)`;
          }

          p.fill(colors.waterDeep[0], colors.waterDeep[1], colors.waterDeep[2], particle.alpha * 0.2);
          p.textAlign(p.CENTER, p.CENTER);
          p.textFont('Georgia');
          p.textSize(particle.size);
          p.textStyle(p.ITALIC);
          p.text(particle.char, 2, 2);

          p.fill(particle.color[0], particle.color[1], particle.color[2], particle.alpha);
          p.text(particle.char, 0, 0);

          p.drawingContext.filter = 'none';
          p.pop();
        }

        p.pop();
      }

      function drawPlantShadows() {
        p.push();
        p.blendMode(p.MULTIPLY);
        plantShadows.forEach(shadow => {
          let swayAngle = p.sin(shadow.swayPhase) * 0.15;
          let currentAngle = shadow.baseAngle + swayAngle;
          p.push();
          p.translate(shadow.x, shadow.y);
          p.rotate(currentAngle);
          for (let i = 0; i < shadow.leafCount; i++) {
            let leafAngle = (i / shadow.leafCount) * p.PI * 2 + p.sin(time * 0.5 + i) * 0.2;
            let leafLength = shadow.leafSize * (0.8 + p.sin(time * 0.3 + i * 0.5) * 0.2);
            let leafWidth = shadow.leafSize * 0.3;
            p.push();
            p.rotate(leafAngle);
            let leafOpacity = shadow.opacity + p.sin(time + i) * 10;
            if (shadow.type === 'palm') {
              p.fill(colors.palmShadow[0], colors.palmShadow[1], colors.palmShadow[2], leafOpacity);
              p.noStroke();
              p.beginShape();
              p.vertex(0, 0);
              p.bezierVertex(leafWidth * 0.5, leafLength * 0.3, leafWidth * 0.3, leafLength * 0.8, 0, leafLength);
              p.bezierVertex(-leafWidth * 0.3, leafLength * 0.8, -leafWidth * 0.5, leafLength * 0.3, 0, 0);
              p.endShape(p.CLOSE);
              p.stroke(colors.palmShadow[0] + 20, colors.palmShadow[1] + 20, colors.palmShadow[2] + 20, leafOpacity * 0.5);
              p.strokeWeight(1);
              p.line(0, 0, 0, leafLength * 0.9);
            } else {
              p.fill(colors.leafShadow[0], colors.leafShadow[1], colors.leafShadow[2], leafOpacity);
              p.noStroke();
              p.ellipse(0, leafLength * 0.5, leafWidth * 0.4, leafLength);
              for (let j = 0; j < 5; j++) {
                let subY = (j / 5) * leafLength * 0.8 + leafLength * 0.1;
                let subSize = leafWidth * (0.6 - j * 0.08);
                p.ellipse(-subSize * 0.8, subY, subSize, subSize * 1.5);
                p.ellipse(subSize * 0.8, subY, subSize, subSize * 1.5);
              }
            }
            p.pop();
          }
          p.fill(40, 60, 50, shadow.opacity * 0.8);
          p.noStroke();
          p.circle(0, 0, shadow.leafSize * 0.15);
          p.pop();
        });
        p.pop();

      function drawSunSpotOnPoolFloor() {
        if (!sunSpot) return;
        p.push();
        p.blendMode(p.ADD);
        let gradient = p.drawingContext.createRadialGradient(
          sunSpot.x, sunSpot.y, 0,
          sunSpot.x, sunSpot.y, sunSpot.radius
        );
        gradient.addColorStop(0, `rgba(255, 255, 220, ${sunSpot.alpha/255})`);
        gradient.addColorStop(0.5, `rgba(255, 250, 200, ${sunSpot.alpha*0.5/255})`);
        gradient.addColorStop(1, 'transparent');
        p.drawingContext.fillStyle = gradient;
        p.noStroke();
        p.ellipse(sunSpot.x, sunSpot.y, sunSpot.radius * 2);
        for (let i = 0; i < 3; i++) {
          let offsetX = p.cos(time * 0.5 + i * 2) * 30;
          let offsetY = p.sin(time * 0.4 + i * 2) * 20;
          let r = sunSpot.radius * (0.6 - i * 0.15);
          let alpha = sunSpot.alpha * (0.5 - i * 0.1);
          let spotGrad = p.drawingContext.createRadialGradient(
            sunSpot.x + offsetX, sunSpot.y + offsetY, 0,
            sunSpot.x + offsetX, sunSpot.y + offsetY, r
          );
          spotGrad.addColorStop(0, `rgba(255, 255, 240, ${alpha/255})`);
          spotGrad.addColorStop(1, 'transparent');
          p.drawingContext.fillStyle = spotGrad;
          p.ellipse(sunSpot.x + offsetX, sunSpot.y + offsetY, r * 2);
        }
        p.pop();
      }

      function drawFlamingo() {
        if (!flamingo) return;
        p.push();
        p.translate(flamingo.x, flamingo.y + flamingo.floatOffset);
        p.rotate(flamingo.rotation);
        let s = flamingo.size;
        p.fill(0, 0, 0, 40);

        p.ellipse(15, 15, s * 0.9, s * 0.9);
        let pink = p.color(colors.flamingoPink[0], colors.flamingoPink[1], colors.flamingoPink[2]);
        let darkPink = p.color(colors.flamingoDark[0], colors.flamingoDark[1], colors.flamingoDark[2]);
        for (let i = 0; i < 5; i++) {
          let ratio = i / 5;
          let c = p.lerpColor(darkPink, pink, ratio);
          p.fill(c);
          p.ellipse(0, 0, s * (1 - ratio * 0.1), s * (1 - ratio * 0.1));
        }
        p.fill(colors.waterDeep[0], colors.waterDeep[1], colors.waterDeep[2], 200);
        p.ellipse(0, 0, s * 0.5, s * 0.5);
        let headX = 0;
        let headY = -s * 0.45;
        let headSize = s * 0.35;
        p.fill(pink);
        p.ellipse(headX, headY + headSize * 0.3, headSize * 0.8, headSize * 0.6);
        p.fill(pink);
        p.ellipse(headX, headY, headSize, headSize * 0.9);
        p.fill(colors.beakBlack);
        p.beginShape();
        p.vertex(headX - headSize * 0.3, headY + headSize * 0.1);
        p.vertex(headX - headSize * 0.6, headY + headSize * 0.3);
        p.vertex(headX - headSize * 0.5, headY + headSize * 0.4);
        p.vertex(headX - headSize * 0.2, headY + headSize * 0.2);
        p.endShape(p.CLOSE);
        p.fill(colors.beakWhite);
        p.beginShape();
        p.vertex(headX - headSize * 0.3, headY + headSize * 0.1);
        p.vertex(headX - headSize * 0.25, headY - headSize * 0.1);
        p.vertex(headX - headSize * 0.15, headY + headSize * 0.05);
        p.vertex(headX - headSize * 0.2, headY + headSize * 0.2);
        p.endShape(p.CLOSE);
        p.fill(0);
        p.circle(headX - headSize * 0.15, headY - headSize * 0.1, headSize * 0.12);
        p.fill(255);
        p.circle(headX - headSize * 0.13, headY - headSize * 0.12, headSize * 0.04);
        let wingSize = s * 0.25;
        p.fill(pink);
        p.ellipse(-s * 0.4, 0, wingSize, wingSize * 1.2);
        p.fill(darkPink);
        p.ellipse(-s * 0.4, 0, wingSize * 0.6, wingSize * 0.8);
        p.fill(pink);
        p.ellipse(s * 0.4, 0, wingSize, wingSize * 1.2);
        p.fill(darkPink);
        p.ellipse(s * 0.4, 0, wingSize * 0.6, wingSize * 0.8);
        p.fill(pink);
        p.ellipse(0, s * 0.4, wingSize * 0.8, wingSize);
        p.fill(255, 255, 255, 60);
        p.ellipse(-s * 0.15, -s * 0.15, s * 0.2, s * 0.15);
        p.ellipse(s * 0.1, -s * 0.2, s * 0.15, s * 0.1);
        p.pop();
      }

      function drawSkyReflection() {
        for (let y = 0; y < p.height; y++) {
          let inter = p.map(y, 0, p.height, 0, 1);
          let c = p.lerpColor(
            p.color(240, 248, 255), 
            p.color(255, 250, 240), 
            inter
          );
          p.stroke(c);
          p.line(0, y, p.width, y);
        }
      }

      function drawUnderwaterTiles() {
        p.noStroke();
        tiles.forEach(tile => {
          let waveY = p.sin(time + tile.x * 0.01 + tile.wavePhase) * 3;
          let waveX = p.cos(time * 0.7 + tile.y * 0.01) * 2;
          let d = p.dist(p.mouseX, p.mouseY, tile.x + tile.size/2, tile.y + tile.size/2);
          let mouseDistort = p.map(d, 0, 150, 15, 0, true);
          waveX += (p.mouseX - tile.x) * mouseDistort * 0.01;
          waveY += (p.mouseY - tile.y) * mouseDistort * 0.01;
          let depthAlpha = p.map(tile.y, 0, p.height, 200, 255);
          let r = tile.baseColor[0];
          let g = tile.baseColor[1];
          let b = tile.baseColor[2];
          let glow = p.sin(time * 2 + tile.x * 0.02) * 20;
          p.fill(r + glow, g + glow * 0.5, b, depthAlpha);
          p.push();
          p.translate(tile.x + waveX, tile.y + waveY);
          p.rect(0, 0, tile.size * 0.9, tile.size * 0.9, 4);
          p.fill(255, 255, 255, 30 + glow * 0.5);
          p.rect(2, 2, tile.size * 0.3, tile.size * 0.3, 2);
          p.pop();
        });
      }

      function drawRipples() {
        for (let i = ripples.length - 1; i >= 0; i--) {
          let r = ripples[i];
          r.radius += r.speed;
          r.alpha -= 2;
          r.lineWidth *= 0.98;
          if (r.alpha <= 0) {
            ripples.splice(i, 1);
            continue;
          }
          p.noFill();
          for (let j = 0; j < 3; j++) {
            let offset = j * 15;
            let alpha = r.alpha * (1 - j * 0.3);

            if (r.isLyricRipple) {
              p.stroke(r.lyricColor[0], r.lyricColor[1], r.lyricColor[2], alpha);
            } else {
              p.stroke(colors.neonCyan[0], colors.neonCyan[1], colors.neonCyan[2], alpha);
            }

            p.strokeWeight(r.lineWidth * (1 - j * 0.2));
            p.ellipse(r.x, r.y, (r.radius + offset) * 2);

            if (!r.isLyricRipple) {
              p.stroke(colors.neonPink[0], colors.neonPink[1], colors.neonPink[2], alpha * 0.5);
              p.ellipse(r.x, r.y, (r.radius + offset) * 2.2);
            }
          }
        }
      }

      function drawParticles() {
        p.noStroke();
        particles.forEach(pt => {
          pt.x += pt.vx + p.sin(time + pt.y * 0.01) * 0.5;
          pt.y += pt.vy + p.cos(time * 0.8 + pt.x * 0.01) * 0.3;
          if (pt.x < 0) pt.x = p.width;
          if (pt.x > p.width) pt.x = 0;
          if (pt.y < 0) pt.y = p.height;
          if (pt.y > p.height) pt.y = 0;
          let twinkle = p.sin(time * 3 + pt.x) * 20;
          let alpha = pt.alpha + twinkle;
          p.fill(pt.color[0], pt.color[1], pt.color[2], alpha);
          p.circle(pt.x, pt.y, pt.size);
          p.fill(pt.color[0], pt.color[1], pt.color[2], alpha * 0.3);
          p.circle(pt.x, pt.y, pt.size * 2);
        });
      }

      function drawWaterSurface() {
        p.noStroke();
        for (let x = 0; x < p.width; x += 20) {
          let waveHeight = p.sin(time * 2 + x * 0.02) * 5;
          let shimmer = p.map(p.sin(time * 3 + x * 0.05), -1, 1, 0, 100);
          p.fill(255, 255, 255, shimmer);
          p.ellipse(x, 50 + waveHeight, 30, 8);
        }
        let surfaceGradient = p.drawingContext.createLinearGradient(0, 0, 0, 150);
        surfaceGradient.addColorStop(0, 'rgba(255, 255, 255, 0.2)');
        surfaceGradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.05)');
        surfaceGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
        p.drawingContext.fillStyle = surfaceGradient;
        p.rect(0, 0, p.width, 150);
      }

        p.blendMode(p.ADD);

        sunRays.forEach(ray => {
          let pulse = p.sin(time * ray.pulseSpeed + ray.phase) * 0.5 + 0.5;
          let currentAlpha = ray.alpha * pulse;

          let endX = p.width * 0.5 + p.cos(ray.angle) * ray.length;
          let endY = p.height * 0.08 + p.sin(ray.angle) * ray.length;

          let gradient = p.drawingContext.createLinearGradient(
            p.width * 0.5, p.height * 0.08,
            endX, endY
          );
          gradient.addColorStop(0, `rgba(255, 255, 220, ${currentAlpha/255})`);
          gradient.addColorStop(0.5, `rgba(255, 250, 200, ${(currentAlpha*0.5)/255})`);
          gradient.addColorStop(1, `rgba(255, 250, 180, 0)`);

          p.drawingContext.strokeStyle = gradient;
          p.drawingContext.lineWidth = ray.width;
          p.drawingContext.beginPath();
          p.drawingContext.moveTo(p.width * 0.5, p.height * 0.08);
          p.drawingContext.lineTo(endX, endY);
          p.drawingContext.stroke();
        });

        p.pop();
      }

      function drawClouds() {
        p.noStroke();

        clouds.forEach(cloud => {
          cloud.x += cloud.speed;
          if (cloud.x > p.width + cloud.size) {
            cloud.x = -cloud.size;
            cloud.y = p.random(p.height * 0.05, p.height * 0.25);
          }

          let puffSize = cloud.size / cloud.puffs;
          for (let i = 0; i < cloud.puffs; i++) {
            let offsetX = p.cos(i * 0.8 + time * 0.2) * puffSize * 0.3;
            let offsetY = p.sin(i * 0.6 + time * 0.15) * puffSize * 0.2;
            let x = cloud.x + i * puffSize * 0.7 + offsetX;
            let y = cloud.y + offsetY;

            p.fill(255, 255, 250, cloud.opacity);
            p.circle(x, y, puffSize);

            p.fill(255, 255, 255, cloud.opacity * 0.5);
            p.circle(x - puffSize * 0.2, y - puffSize * 0.1, puffSize * 0.6);
          }
        });
      }

      function drawHeatWaves() {
        p.push();
        p.blendMode(p.ADD);

        heatWaves.forEach(wave => {
          wave.offset += wave.speed;

          let y = wave.y + p.sin(time * 2 + wave.offset * 0.01) * 10;

          for (let i = 0; i < 3; i++) {
            let waveY = y + i * 15;
            let alpha = 8 + p.sin(time * 3 + i) * 5;

            p.fill(255, 255, 240, alpha);
            p.rect(wave.x, waveY, wave.width, wave.height * 0.3);
          }
        });

        p.pop();
      }

      function drawGodRays() {
        p.push();
        p.blendMode(p.ADD);

        godRays.forEach((ray, index) => {
          let leafIndex = index % leaves.length;
          let leaf = leaves[leafIndex];

          if (leaf && p.random() > 0.7) {
            ray.x = leaf.x;
            ray.y = leaf.y;
            ray.angle = p.PI / 2 + p.random(-0.3, 0.3);
          }

          let pulse = p.sin(time * ray.pulseSpeed + ray.phase) * 0.5 + 0.5;
          let currentAlpha = ray.alpha * pulse;

          let endX = ray.x + p.cos(ray.angle) * ray.length;
          let endY = ray.y + p.sin(ray.angle) * ray.length;

          let gradient = p.drawingContext.createLinearGradient(
            ray.x, ray.y,
            endX, endY
          );
          gradient.addColorStop(0, `rgba(${ray.color[0]}, ${ray.color[1]}, ${ray.color[2]}, 0)`);
          gradient.addColorStop(0.2, `rgba(${ray.color[0]}, ${ray.color[1]}, ${ray.color[2]}, ${(currentAlpha*0.8)/255})`);
          gradient.addColorStop(0.5, `rgba(${ray.color[0]}, ${ray.color[1]}, ${ray.color[2]}, ${currentAlpha/255})`);
          gradient.addColorStop(0.8, `rgba(${ray.color[0]}, ${ray.color[1]}, ${ray.color[2]}, ${(currentAlpha*0.6)/255})`);
          gradient.addColorStop(1, `rgba(${ray.color[0]}, ${ray.color[1]}, ${ray.color[2]}, 0)`);

          p.drawingContext.strokeStyle = gradient;
          p.drawingContext.lineWidth = ray.width;
          p.drawingContext.beginPath();
          p.drawingContext.moveTo(ray.x, ray.y);
          p.drawingContext.lineTo(endX, endY);
          p.drawingContext.stroke();
        });

        p.pop();
      }

      function drawSummerHaze() {
        p.push();
        p.blendMode(p.ADD);

        let hazeAlpha = 15 + p.sin(time * 0.5) * 5;
        p.fill(255, 240, 200, hazeAlpha);
        p.rect(0, 0, p.width, p.height);

        let topGradient = p.drawingContext.createLinearGradient(
          0, 0,
          0, p.height * 0.4
        );
        topGradient.addColorStop(0, `rgba(255, 255, 230, ${hazeAlpha * 1.5 / 255})`);
        topGradient.addColorStop(1, 'rgba(255, 255, 230, 0)');
        p.drawingContext.fillStyle = topGradient;
        p.rect(0, 0, p.width, p.height * 0.4);

        p.pop();
      }

      function updateLyrics() {
        let currentTime = p.millis();

        lyrics.forEach((lyric, index) => {
          let triggerTime = lyric.delay;

          if (currentTime > triggerTime && !lyric.isActive) {
            lyric.isActive = true;
            lyric.fadeInStart = currentTime;
            lyric.fadeState = "in";
            lyric.alpha = 0;
          }

          if (lyric.isActive) {
            if (lyric.fadeState === "in") {
              let fadeInDuration = 2500;
              let progress = (currentTime - lyric.fadeInStart) / fadeInDuration;

              if (progress >= 1) {
                lyric.alpha = lyric.targetAlpha;
                lyric.fadeState = "hold";
                lyric.holdStart = currentTime;
              } else {
                lyric.alpha = lyric.targetAlpha * (1 - p.pow(1 - progress, 3));
              }
            }
            else if (lyric.fadeState === "hold") {
              let holdDuration = 5000;

              if (currentTime - lyric.holdStart >= holdDuration) {
                lyric.fadeState = "out";
                lyric.fadeOutStart = currentTime;
              }
            }
            else if (lyric.fadeState === "out") {
              let fadeOutDuration = 3500;
              let progress = (currentTime - lyric.fadeOutStart) / fadeOutDuration;

              if (progress >= 1) {
                lyric.alpha = 0;
                lyric.isActive = false;
              } else {
                lyric.alpha = lyric.targetAlpha * (1 - progress);
              }
            }
          }
        });
      }

      function drawLyrics() {
        p.push();

        lyrics.forEach(lyric => {
          if (lyric.alpha > 0) {
            p.push();
            p.translate(lyric.x, lyric.y);

            let lineHeight = 26;
            let totalHeight = lyric.lines.length * lineHeight;
            let startY = -totalHeight / 2 + lineHeight / 2;

            lyric.lines.forEach((line, lineIndex) => {
              let y = startY + lineIndex * lineHeight;

              p.fill(60, 80, 100, lyric.alpha * 0.3);
              p.textAlign(p.CENTER, p.CENTER);
              p.textFont("Georgia");
              p.textSize(17);
              p.textStyle(p.NORMAL);
              p.text(line, 2, y + 2);

              p.fill(40, 70, 50, lyric.alpha);
              p.text(line, 0, y);
            });

            p.pop();
          }
        });

        p.pop();
      }

      function updateLeaves() {
        let mouseInfluenceRadius = 130;

        leaves.forEach(leaf => {
          let d = p.dist(p.mouseX, p.mouseY, leaf.x, leaf.y);

          if (d < mouseInfluenceRadius && (p.mouseX !== 0 || p.mouseY !== 0)) {
            let angle = p.atan2(leaf.y - p.mouseY, leaf.x - p.mouseX);
            let force = p.map(d, 0, mouseInfluenceRadius, 3, 0, true);

            leaf.pushVx += p.cos(angle) * force * 0.12;
            leaf.pushVy += p.sin(angle) * force * 0.12;
            leaf.pushed = true;
          }

          if (leaf.pushed) {
            let dx = leaf.baseX - leaf.x;
            let dy = leaf.baseY - leaf.y;

            leaf.pushVx += dx * leaf.returnSpeed;
            leaf.pushVy += dy * leaf.returnSpeed;

            leaf.pushVx *= 0.93;
            leaf.pushVy *= 0.93;

            leaf.x += leaf.pushVx;
            leaf.y += leaf.pushVy;

            if (p.abs(dx) < 0.5 && p.abs(dy) < 0.5 && 
                p.abs(leaf.pushVx) < 0.05 && p.abs(leaf.pushVy) < 0.05) {
              leaf.x = leaf.baseX;
              leaf.y = leaf.baseY;
              leaf.pushVx = 0;
              leaf.pushVy = 0;
              leaf.pushed = false;
            }
          } else {
            let swayX = p.sin(time * leaf.swaySpeed + leaf.swayPhase) * 2.5;
            let swayY = p.cos(time * leaf.swaySpeed * 0.7 + leaf.swayPhase) * 2;

            leaf.x = leaf.baseX + swayX;
            leaf.y = leaf.baseY + swayY;
          }

          leaf.angle = leaf.baseAngle + p.sin(time * leaf.swaySpeed + leaf.swayPhase) * 0.12;
        });
      }

      function drawLeaves() {
        [0, 1].forEach(layer => {
          leaves.filter(l => l.layer === layer).forEach(leaf => {
            p.push();
            p.translate(leaf.x, leaf.y);
            p.rotate(leaf.angle);

            p.fill(leaf.color);
            p.noStroke();

            p.beginShape();
            p.vertex(0, -leaf.size/2);
            p.bezierVertex(
              leaf.size/2.2, -leaf.size/3,
              leaf.size/2.2, leaf.size/3,
              0, leaf.size/2
            );
            p.bezierVertex(
              -leaf.size/2.2, leaf.size/3,
              -leaf.size/2.2, -leaf.size/3,
              0, -leaf.size/2
            );
            p.endShape(p.CLOSE);

            p.stroke(80, 110, 40, 90);
            p.strokeWeight(1);
            p.line(0, -leaf.size/2.5, 0, leaf.size/2.5);

            p.strokeWeight(0.5);
            p.line(0, -leaf.size/6, leaf.size/3.5, -leaf.size/4);
            p.line(0, -leaf.size/6, -leaf.size/3.5, -leaf.size/4);
            p.line(0, leaf.size/6, leaf.size/4, leaf.size/4);
            p.line(0, leaf.size/6, -leaf.size/4, leaf.size/4);

            p.pop();
          });
        });
      }

      function updateLemons() {
        let mouseInfluenceRadius = 130;

        lemons.forEach(lemon => {
          let d = p.dist(p.mouseX, p.mouseY, lemon.x, lemon.y);

          if (d < mouseInfluenceRadius && (p.mouseX !== 0 || p.mouseY !== 0)) {
            let angle = p.atan2(lemon.y - p.mouseY, lemon.x - p.mouseX);
            let force = p.map(d, 0, mouseInfluenceRadius, 3.5, 0, true);

            lemon.pushVx += p.cos(angle) * force * 0.15;
            lemon.pushVy += p.sin(angle) * force * 0.15;
            lemon.pushed = true;
          }

          if (lemon.pushed) {
            let dx = lemon.baseX - lemon.x;
            let dy = lemon.baseY - lemon.y;

            lemon.pushVx += dx * lemon.returnSpeed;
            lemon.pushVy += dy * lemon.returnSpeed;

            lemon.pushVx *= 0.92;
            lemon.pushVy *= 0.92;

            lemon.x += lemon.pushVx;
            lemon.y += lemon.pushVy;

            if (p.abs(dx) < 0.5 && p.abs(dy) < 0.5 && 
                p.abs(lemon.pushVx) < 0.05 && p.abs(lemon.pushVy) < 0.05) {
              lemon.x = lemon.baseX;
              lemon.y = lemon.baseY;
              lemon.pushVx = 0;
              lemon.pushVy = 0;
              lemon.pushed = false;
            }
          } else {
            let swayX = p.sin(time * lemon.swaySpeed + lemon.swayPhase) * 1.5;
            let swayY = p.cos(time * lemon.swaySpeed * 0.7 + lemon.swayPhase) * 1;

            lemon.x = lemon.baseX + swayX;
            lemon.y = lemon.baseY + swayY;
          }

          lemon.angle = p.sin(time * lemon.swaySpeed + lemon.swayPhase) * 0.1;
        });
      }

      function drawLemons() {
        lemons.forEach(lemon => {
          p.push();
          p.translate(lemon.x, lemon.y);
          p.rotate(lemon.angle);

          p.fill(lemon.shadowColor);
          p.noStroke();
          p.ellipse(3, 3, lemon.size * 1.1, lemon.size * 0.85);

          p.fill(lemon.color);
          p.ellipse(0, 0, lemon.size, lemon.size * 0.8);

          p.fill(255, 255, 220, 150);
          p.ellipse(-lemon.size * 0.2, -lemon.size * 0.15, lemon.size * 0.3, lemon.size * 0.2);

          p.fill(230, 200, 40, 100);
          p.circle(-lemon.size * 0.1, lemon.size * 0.1, 2);
          p.circle(lemon.size * 0.15, -lemon.size * 0.05, 1.5);
          p.circle(0, lemon.size * 0.2, 1);

          p.pop();
        });
      }

      p.windowResized = function() {
        p.resizeCanvas(p.windowWidth, p.windowHeight);
        initClusteredLeavesAndLemons();
        initClouds();
        initSunRays();
        initGodRays();
        initHeatWaves();
        initLyrics();
      };

      p.mouseDragged = function() {
        leaves.forEach(leaf => {
          let d = p.dist(p.mouseX, p.mouseY, leaf.x, leaf.y);
          if (d < 130) {
            let angle = p.atan2(leaf.y - p.mouseY, leaf.x - p.mouseX);
            let force = p.map(d, 0, 130, 5, 0, true);
            leaf.pushVx += p.cos(angle) * force;
            leaf.pushVy += p.sin(angle) * force;
            leaf.pushed = true;
          }
        });

        lemons.forEach(lemon => {
          let d = p.dist(p.mouseX, p.mouseY, lemon.x, lemon.y);
          if (d < 130) {
            let angle = p.atan2(lemon.y - p.mouseY, lemon.x - p.mouseX);
            let force = p.map(d, 0, 130, 4, 0, true);
            lemon.pushVx += p.cos(angle) * force;
            lemon.pushVy += p.sin(angle) * force;
            lemon.pushed = true;
          }
        });
      };
    };

    // ============================================
    // 藏书票功能 (Collector's Stamp)
    // ============================================

    function showCollectorStamp() {
      const overlay = document.getElementById('collector-stamp-overlay');
      if (!overlay) return;

      updateStampData();

      overlay.style.display = 'flex';
      void overlay.offsetHeight;
      overlay.classList.add('visible');

      document.body.style.overflow = 'hidden';
    }

    function closeCollectorStamp() {
      const overlay = document.getElementById('collector-stamp-overlay');
      if (!overlay) return;

      overlay.classList.remove('visible');

      if (window.stampDurationInterval) {
        clearInterval(window.stampDurationInterval);
        window.stampDurationInterval = null;
      }

      setTimeout(() => {
        overlay.style.display = 'none';
        document.body.style.overflow = '';
      }, 600);
    }

    function updateStampData() {
      const sessionIdEl = document.getElementById('stamp-session-id');
      if (sessionIdEl && State.sessionId) {
        sessionIdEl.textContent = State.sessionId;
      }

      const durationEl = document.getElementById('stamp-duration');
      if (durationEl) {
        const updateDuration = () => {
          const elapsed = Date.now() - State.startTime;
          const h = Math.floor(elapsed / 3600000).toString().padStart(2, '0');
          const m = Math.floor((elapsed % 3600000) / 60000).toString().padStart(2, '0');
          const s = Math.floor((elapsed % 60000) / 1000).toString().padStart(2, '0');
          durationEl.textContent = `${h}:${m}:${s}`;
        };
        updateDuration();
        if (window.stampDurationInterval) clearInterval(window.stampDurationInterval);
        window.stampDurationInterval = setInterval(updateDuration, 1000);
      }

      const channelsVisitedEl = document.getElementById('stamp-channels-visited');
      if (channelsVisitedEl) {
        const uniqueVisited = [...new Set(State.visited)];
        channelsVisitedEl.textContent = `${uniqueVisited.length} / 4`;
      }

      const statTracesEl = document.getElementById('stat-traces');
      const statChannelsEl = document.getElementById('stat-channels');
      const statWordsEl = document.getElementById('stat-words');

      let totalTraces = 0;
      let totalWords = 0;
      const tracesList = [];

      Object.keys(State.channelTraces).forEach(channelId => {
        const channelTraces = State.channelTraces[channelId];
        const channelName = CONFIG.channels[channelId]?.title || channelId;

        channelTraces.forEach((traceText, index) => {
          totalTraces++;
          totalWords += traceText.length;

          tracesList.push({
            channel: channelName,
            text: traceText,
            time: Date.now() - (channelTraces.length - index) * 60000
          });
        });
      });

      if (statTracesEl) statTracesEl.textContent = totalTraces;
      if (statChannelsEl) statChannelsEl.textContent = [...new Set(State.visited)].length;
      if (statWordsEl) statWordsEl.textContent = totalWords;

      const sealSection = document.getElementById('stamp-seal-section');
      const sealText = document.getElementById('stamp-seal-text');
      if (sealSection && sealText && State.sealResponse) {
        sealSection.style.display = 'block';
        sealText.textContent = State.sealResponse;
      }

      const tracesListEl = document.getElementById('stamp-traces-list');
      if (tracesListEl) {
        if (tracesList.length === 0) {
          tracesListEl.innerHTML = `
            <div class="stamp-empty-traces">
              <div style="font-size: 48px; margin-bottom: 20px; opacity: 0.3;">✦</div>
              你还未在任何通道留下痕迹<br>
              <span style="font-size: 12px; opacity: 0.7;">夏日的风仍在等待你的印记...</span>
            </div>
          `;
        } else {
          tracesListEl.innerHTML = tracesList.map(trace => {
            const timeStr = formatTraceTime(trace.time);
            return `
              <div class="stamp-trace-item">
                <span class="stamp-trace-channel">${trace.channel}</span>
                <span class="stamp-trace-text">${escapeHtml(trace.text)}</span>
                <span class="stamp-trace-time">${timeStr}</span>
              </div>
            `;
          }).join('');
        }
      }

      const dateEl = document.getElementById('stamp-date');
      if (dateEl) {
        const now = new Date();
        const dateStr = now.toLocaleDateString('zh-CN', {
          year: 'numeric',
          month: 'long',
          day: 'numeric'
        });
        dateEl.textContent = dateStr;
      }
    }

    function formatTraceTime(timestamp) {
      const now = Date.now();
      const diff = now - timestamp;

      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return `${Math.floor(diff/60000)}分钟前`;
      if (diff < 86400000) return `${Math.floor(diff/3600000)}小时前`;
      return new Date(timestamp).toLocaleDateString('zh-CN', {month: 'short', day: 'numeric'});
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.addEventListener('click', function(e) {
      const overlay = document.getElementById('collector-stamp-overlay');
      if (e.target === overlay) {
        closeCollectorStamp();
      }
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeCollectorStamp();
      }
    });

    window.addEventListener('beforeunload', function(e) {
      if (State.sealBroken && Object.keys(State.channelTraces).length > 0) {
        e.preventDefault();
        e.returnValue = '你的夏日痕迹还在这里，确定要离开吗？';
        return e.returnValue;
      }
    });

    // ============================================
    // 音乐播放器功能
    // ============================================

    const MusicPlayer = {
      audio: null,
      currentTrack: null,
      isPlaying: false,

      tracks: {
        contrail: {
          title: "Chemtrails Over The Country Club",
          artist: "Lana Del Rey",
          src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
        },
        lemontree: {
          title: "Fourth of July",
          artist: "Sufjan Stevens",
          src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
        },
        highway: {
          title: "Pink + White",
          artist: "Frank Ocean",
          src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
        },
        pool: {
          title: "Dreamland",
          artist: "Glass Animals",
          src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3"
        }
      },

      init() {
        this.audio = document.getElementById('audio-player');
        if (!this.audio) return;

        this.audio.volume = 0.3;

        this.audio.addEventListener('timeupdate', () => this.updateProgress());
        this.audio.addEventListener('ended', () => this.onTrackEnd());
        this.audio.addEventListener('error', (e) => this.onError(e));

        console.log('[Music Player] 初始化完成');
      },

      play(channelId) {
        const track = this.tracks[channelId];
        if (!track) return;

        if (this.currentTrack === channelId && this.isPlaying) {
          return;
        }

        if (this.currentTrack !== channelId) {
          this.audio.pause();
          this.audio.currentTime = 0;
          this.currentTrack = channelId;
          this.audio.src = track.src;
        }

        const playPromise = this.audio.play();
        if (playPromise !== undefined) {
          playPromise.then(() => {
            this.isPlaying = true;
            this.updateUI(track);
            this.showPlayer();
            console.log(`[Music Player] 开始播放: ${track.title} - ${track.artist}`);
          }).catch(error => {
            console.log('[Music Player] 播放失败:', error);
            this.updateUI(track);
            this.showPlayer();
          });
        }
      },

      pause() {
        if (!this.audio) return;
        this.audio.pause();
        this.isPlaying = false;
        this.updateUI();
        console.log('[Music Player] 已暂停');
      },

      stop() {
        if (!this.audio) return;
        this.audio.pause();
        this.audio.currentTime = 0;
        this.isPlaying = false;
        this.currentTrack = null;
        this.hidePlayer();
        console.log('[Music Player] 已停止');
      },

      toggle() {
        if (!this.currentTrack) return;

        if (this.isPlaying) {
          this.pause();
        } else {
          this.play(this.currentTrack);
        }
      },

      updateUI(track) {
        const titleEl = document.getElementById('music-title');
        const artistEl = document.getElementById('music-artist');
        const iconEl = document.getElementById('music-icon');
        const btnEl = document.getElementById('music-toggle');

        if (track) {
          titleEl.textContent = track.title;
          artistEl.textContent = track.artist;
        }

        if (this.isPlaying) {
          iconEl.textContent = '❚❚';
          btnEl.classList.add('playing');
        } else {
          iconEl.textContent = '▶';
          btnEl.classList.remove('playing');
        }
      },

      updateProgress() {
        if (!this.audio || !this.audio.duration) return;

        const progress = (this.audio.currentTime / this.audio.duration) * 100;
        const progressBar = document.getElementById('music-progress-bar');
        if (progressBar) {
          progressBar.style.width = progress + '%';
        }
      },

      seek(percent) {
        if (!this.audio || !this.audio.duration) return;
        this.audio.currentTime = (percent / 100) * this.audio.duration;
      },

      setVolume(value) {
        if (!this.audio) return;
        this.audio.volume = value / 100;
      },

      onTrackEnd() {
        if (this.audio) {
          this.audio.currentTime = 0;
          this.audio.play();
        }
      },

      onError(error) {
        console.log('[Music Player] 音频错误:', error);
        this.isPlaying = false;
        this.updateUI();
      },

      showPlayer() {
        const player = document.getElementById('music-player');
        if (player) {
          player.classList.add('visible');
        }
      },

      hidePlayer() {
        const player = document.getElementById('music-player');
        if (player) {
          player.classList.remove('visible');
        }
      }
    };

    function toggleMusic() {
      MusicPlayer.toggle();
    }

    function seekMusic(event) {
      const progress = document.getElementById('music-progress');
      if (!progress) return;

      const rect = progress.getBoundingClientRect();
      const percent = ((event.clientX - rect.left) / rect.width) * 100;
      MusicPlayer.seek(percent);
    }

    function changeVolume(value) {
      MusicPlayer.setVolume(value);
    }

    const originalOpenChannel = openChannel;
    openChannel = function(channelId) {
      originalOpenChannel(channelId);

      setTimeout(() => {
        MusicPlayer.play(channelId);
      }, 500);
    };

    const originalClosePage = closePage;
    closePage = function() {
      MusicPlayer.stop();

      originalClosePage();
    };

    document.addEventListener('DOMContentLoaded', () => {
      MusicPlayer.init();
    });
  </script>

</body>
</html>
